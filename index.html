및 고객 확인 방법"],"skill":["고객 경청 및 핵심 내용 파악 능력","공감적 표현 및 고충 수용 능력","정확하고 이해하기 쉬운 답변 제공 능력","불만 고객 침착 응대 및 상황 관리 능력","고객 기대 수준 파악 및 해결 방안 제시 능력"],"attitude":["고객의 입장에서 생각하고 진심으로 도움을 드리려는 고객 중심의 자세","어떤 상황에서도 친절하고 침착하게 응대하려는 서비스 마인드","고객이 만족할 때까지 끝까지 최선을 다하려는 책임감"],"certs":["CS Leaders(한국생산성본부)","소비자전문상담사 2급","텔레마케터 2급 (한국산업인력공단)"],"level":"상담직","level_raw":"상담직","level_buckets":["담당"],"level_display":"상담직(담당)"},{"name":"업무지식 능력","definition":"자사 제품·서비스·AS 프로세스에 대한 전문 지식을 바탕으로 고객에게 신뢰할 수 있는 답변을 제공하는 역량","behaviors":["자사 전 제품의 구성·특성·연령별 특징을 이해하고 고객 문의에 정확하게 답변할 수 있다.","AS 접수 기준·처리 절차·소요 기간 등 AS 프로세스를 숙지하고 고객에게 명확하게 안내할 수 있다.","도서정가제·반품 정책·배송 기준 등 주요 서비스 정책을 이해하고 고객 문의에 정확하게 답변할 수 있다.","제품 관련 자주 묻는 질문(FAQ)을 숙지하고 신속하게 답변할 수 있다.","신제품 출시·제품 개정 등 변경 사항을 빠르게 습득하고 최신 정보를 바탕으로 상담할 수 있다.","고객 문의 내용이 자신의 업무 범위를 벗어날 경우 적합한 부서로 안내하거나 이관할 수 있다.","업무 지식의 부족한 부분을 스스로 파악하고 학습하여 지속적으로 상담 품질을 높일 수 있다."],"knowledge":["자사 제품 구성·특성·연령별 특징","AS 프로세스 및 처리 절차","주요 서비스 정책(도서정가제·반품·배송 기준 등)","자주 묻는 질문(FAQ) 및 답변 기준","신제품·제품 개정 등 변경 사항 파악 방법"],"skill":["제품 특성 파악 및 고객 문의 답변 능력","AS 프로세스 안내 및 접수 처리 능력","서비스 정책 안내 능력","FAQ 신속 답변 능력","변경 사항 습득 및 최신 정보 기반 상담 능력"],"attitude":["고객에게 정확한 정보를 제공하기 위해 업무 지식을 지속적으로 학습하려는 자세","모르는 내용을 그냥 넘기지 않고 정확하게 확인하여 답변하려는 책임감","신제품·정책 변경 등 새로운 정보를 빠르게 습득하려는 능동적 자세"],"certs":["CS Leaders(한국생산성본부)","소비자전문상담사 2급","독서지도사 (제품 이해 관련)"],"level":"상담직","level_raw":"상담직","level_buckets":["담당"],"level_display":"상담직(담당)"},{"name":"문제 해결 능력","definition":"고객의 문제를 신속하게 분석하고 적절한 해결 방안을 도출하여 고객 만족을 이끌어내는 역량","behaviors":["고객의 문제를 정확하게 파악하기 위해 적절한 질문을 통해 상황을 구체적으로 확인할 수 있다.","파악된 문제를 유형별로 분류하고 처리 기준에 따라 해결 방법을 신속하게 결정할 수 있다.","표준 처리 절차 내에서 해결 가능한 문제는 즉시 처리하고 고객에게 결과를 안내할 수 있다.","표준 처리 절차로 해결이 어려운 복잡한 문제는 상위자 또는 유관부서와 협의하여 최적의 해결 방안 을 도출할 수 있다.","고객의 입장에서 가장 만족스러운 해결 방안을 선택하고 고객에게 명확하게 설명할 수 있다.","문제 해결 후 고객의 만족 여부를 확인하고 추가적인 문제가 없는지 점검할 수 있다.","해결하기 어려웠던 문제 사례를 기록하고 팀 내에 공유하여 유사 상황 발생 시 참고할 수 있도록 할 수 있다."],"knowledge":["고객 문제 유형 분류 기준 및 처리 방법","표준 처리 절차 및 해결 방법","복잡한 문제 상위자·유관부서 협의 방법","고객 만족 확인 방법","문제 사례 기록 및 공유 방법"],"skill":["고객 문제 파악을 위한 질문 및 상황 확인 능력","문제 유형 분류 및 해결 방법 결정 능력","표준 처리 절차 내 즉시 처리 능력","복잡한 문제 협의 및 최적 해결 방안 도출 능력","문제 해결 후 고객 만족 확인 능력"],"attitude":["고객의 문제를 내 일처럼 여기고 최선의 해결 방안을 찾으려는 고객 중심의 자세","어려운 문제도 포기하지 않고 끝까지 해결하려는 책임감","문제 해결 사례를 팀과 공유하여 조직 전체의 문제 해결 역량을 높이려는 협력적 자세"],"certs":["CS Leaders(한국생산성본부)","소비자전문상담사 2급","텔레마케터 2급 (한국산업인력공단)"],"level":"상담직","level_raw":"상담직","level_buckets":["담당"],"level_display":"상담직(담당)"}]}]};
</script>
<script>
/* ============================================================
   GB 역량사전 — main.js
   ============================================================ */
const DATA = window.GB_DATA;

const LEVELS = ['담당','선임','책임','수석'];
const LEVEL_FULL = {
  '담당': {line1:'실무 및', line2:'업무지원'},
  '선임': {line1:'메인 업무', line2:'담당'},
  '책임': {line1:'중간책임', line2:''},
  '수석': {line1:'리더', line2:''}
};

const state = {
  route: { type: 'home' }, // home | common | role | job | jobOverview
  topFilter: { job: '', level: '', kind: '' },
  openGroups: new Set(['common','role','job']),
  openJobs: new Set(),
  history: [], // stack of previous routes for "이전 페이지" navigation
};

function norm(s){ return (s||'').replace(/\s|·|,|\.|\(|\)|\//g,''); }

// Build job index keyed by normalized job name -> job object
const JOB_BY_NAME = {};
DATA.jobs.forEach(j => { JOB_BY_NAME[j.job] = j; });

function findCommon(name){ return DATA.common.find(c => c.name === name); }
function findRole(name){ return DATA.role.competencies.find(c => c.name === name); }
function findJobComp(jobName, compName){
  const j = JOB_BY_NAME[jobName];
  if(!j) return null;
  return j.competencies.find(c => c.name === compName) || null;
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function homeButtonHtml(){
  return `<div class="page-nav-btns">
    <button class="back-home-btn" data-go-back="1">← 이전 페이지</button>
    <button class="back-home-btn" data-go-home="1">⌂ 처음으로</button>
  </div>`;
}

/* ============== ROUTING ============== */
function routesEqual(a, b){
  if(!a || !b) return false;
  return JSON.stringify(a) === JSON.stringify(b);
}

function go(route, opts){
  opts = opts || {};
  // push the current route onto history before navigating away, unless this navigation
  // is itself a "back" action, or we're already on this exact route.
  if(!opts.isBack && !routesEqual(state.route, route)){
    state.history.push(state.route);
    // cap history length to avoid unbounded growth in a long session
    if(state.history.length > 50) state.history.shift();
  }
  state.route = route;
  if(route.type==='common') state.openGroups.add('common');
  if(route.type==='role') state.openGroups.add('role');
  if(route.type==='job' || route.type==='jobOverview'){ state.openGroups.add('job'); if(route.job) state.openJobs.add(route.job); }
  render();
  document.getElementById('content').scrollTop = 0;
  window.scrollTo(0,0);
  if(window.innerWidth <= 880) document.getElementById('sidebar').classList.remove('open');
}

function goBack(){
  if(state.history.length === 0){ go({type:'home'}); return; }
  const prev = state.history.pop();
  go(prev, {isBack:true});
}

/* ============== SIDEBAR NAV ============== */
function renderNav(){
  const nav = document.getElementById('nav');
  let html = '';

  // 공통역량
  html += `<details class="nav-group" ${state.openGroups.has('common')?'open':''} data-group="common">`;
  html += navGroupSummary('공통역량', 'var(--navy)', DATA.common.length+'개');
  html += `<div class="nav-sub">`;
  DATA.common.forEach(c => {
    const sel = state.route.type==='common' && state.route.name===c.name;
    html += `<button class="nav-sub-item ${sel?'selected':''}" data-nav="common" data-name="${escapeHtml(c.name)}">${escapeHtml(c.name)}</button>`;
  });
  html += `</div></details>`;

  // 역할역량
  html += `<details class="nav-group" ${state.openGroups.has('role')?'open':''} data-group="role">`;
  html += navGroupSummary('역할역량', 'var(--teal)', DATA.role.competencies.length+'개');
  html += `<div class="nav-sub">`;
  LEVELS.forEach(lvl => {
    const comps = DATA.role.competencies.filter(c => c.level === lvl);
    if(!comps.length) return;
    html += `<div class="nav-level-tag">${lvl}</div>`;
    comps.forEach(c => {
      const sel = state.route.type==='role' && state.route.name===c.name;
      html += `<button class="nav-sub-item nav-sub-sub ${sel?'selected':''}" data-nav="role" data-name="${escapeHtml(c.name)}">${escapeHtml(c.name)}</button>`;
    });
  });
  html += `</div></details>`;

  // 직무역량 - grouped by org then job, each job expandable to show competencies
  html += `<details class="nav-group" ${state.openGroups.has('job')?'open':''} data-group="job">`;
  html += navGroupSummary('직무역량', 'var(--plum)', '직무 18개');
  html += `<div class="nav-sub">`;
  DATA.jobs.forEach(j => {
    const jobOpen = state.openJobs.has(j.job);
    const selOverview = state.route.type==='jobOverview' && state.route.job===j.job;
    html += `<details class="nav-job-block" ${jobOpen?'open':''} data-job-details="${escapeHtml(j.job)}">
      <summary class="nav-sub-item nav-job-item ${selOverview?'selected':''}">
        <span class="nav-job-row">
          <span class="nav-job-expand-icon">▸</span>
          <span class="nav-job-text" data-nav="jobOverview" data-job="${escapeHtml(j.job)}"><span style="opacity:.55;font-size:11px;">${escapeHtml(j.org)}</span><br>${escapeHtml(j.job)}</span>
        </span>
      </summary>`;
    html += `<div class="nav-job-comps">`;
    LEVELS.slice().reverse().forEach(lvl => {
      const comps = j.competencies.filter(c => (c.level_buckets||[]).includes(lvl));
      if(!comps.length) return;
      html += `<div class="nav-level-tag" style="padding-left:34px;">${lvl}</div>`;
      comps.forEach(c => {
        const sel = state.route.type==='job' && state.route.job===j.job && state.route.name===c.name;
        html += `<button class="nav-sub-item nav-sub-sub nav-comp-item ${sel?'selected':''}" data-nav="job" data-job="${escapeHtml(j.job)}" data-name="${escapeHtml(c.name)}">${escapeHtml(c.name)}</button>`;
      });
    });
    html += `</div>`;
    html += `</details>`;
  });
  html += `</div></details>`;

  nav.innerHTML = html;

  // top-level group open/close state sync (native <details> toggle event)
  nav.querySelectorAll('details.nav-group').forEach(det => {
    det.addEventListener('toggle', () => {
      const key = det.dataset.group;
      if(det.open) state.openGroups.add(key); else state.openGroups.delete(key);
    });
  });
  // per-job details open/close state sync
  nav.querySelectorAll('details.nav-job-block').forEach(det => {
    det.addEventListener('toggle', () => {
      const job = det.dataset.jobDetails;
      if(det.open) state.openJobs.add(job); else state.openJobs.delete(job);
    });
  });

  nav.querySelectorAll('[data-nav="common"]').forEach(btn => {
    btn.addEventListener('click', () => go({type:'common', name: btn.dataset.name}));
  });
  nav.querySelectorAll('[data-nav="role"]').forEach(btn => {
    btn.addEventListener('click', () => go({type:'role', name: btn.dataset.name}));
  });
  nav.querySelectorAll('[data-nav="jobOverview"]').forEach(textEl => {
    textEl.addEventListener('click', (e) => {
      // prevent this click from also being interpreted as the native <details> toggle click,
      // since we navigate (which re-renders the whole nav) instead.
      e.preventDefault();
      e.stopPropagation();
      go({type:'jobOverview', job: textEl.dataset.job});
    });
  });
  nav.querySelectorAll('[data-nav="job"]').forEach(btn => {
    btn.addEventListener('click', () => go({type:'job', job: btn.dataset.job, name: btn.dataset.name}));
  });
}

function navGroupSummary(label, color, countLabel){
  return `<summary class="nav-group-btn">
      <span class="dot" style="background:${color}"></span>
      <span class="label">${label}</span>
      <span style="font-size:11px;opacity:.45;">${countLabel}</span>
      <span class="chev">▶</span>
    </summary>`;
}

/* ============== TOPBAR ============== */
function renderTopbar(){
  const bar = document.getElementById('topbar');
  const jobOptions = DATA.jobs.map(j => `<option value="${escapeHtml(j.job)}" ${state.topFilter.job===j.job?'selected':''}>${escapeHtml(j.org)} · ${escapeHtml(j.job)}</option>`).join('');
  const levelOptions = LEVELS.map(l => `<option value="${l}" ${state.topFilter.level===l?'selected':''}>${l}</option>`).join('');

  bar.innerHTML = `
    <button id="mobile-menu-btn" aria-label="메뉴">☰</button>
    <span class="topbar-label">내 정보로 찾기</span>
    <select class="filter-select" id="f-job">
      <option value="">직무 선택</option>
      ${jobOptions}
    </select>
    <select class="filter-select" id="f-level">
      <option value="">직급 선택</option>
      ${levelOptions}
    </select>
    <select class="filter-select" id="f-kind">
      <option value="" ${state.topFilter.kind===''?'selected':''}>역량구분 전체</option>
      <option value="common" ${state.topFilter.kind==='common'?'selected':''}>공통역량</option>
      <option value="role" ${state.topFilter.kind==='role'?'selected':''}>역할역량</option>
      <option value="job" ${state.topFilter.kind==='job'?'selected':''}>직무역량</option>
    </select>
    <button class="topbar-go" id="f-go">내 역량 보기</button>
    <button class="topbar-reset" id="f-reset">초기화</button>
  `;

  document.getElementById('mobile-menu-btn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });
  document.getElementById('f-job').addEventListener('change', e => state.topFilter.job = e.target.value);
  document.getElementById('f-level').addEventListener('change', e => state.topFilter.level = e.target.value);
  document.getElementById('f-kind').addEventListener('change', e => state.topFilter.kind = e.target.value);
  document.getElementById('f-go').addEventListener('click', () => {
    go({type:'myCompetencies', job: state.topFilter.job, level: state.topFilter.level, kind: state.topFilter.kind});
  });
  document.getElementById('f-reset').addEventListener('click', () => {
    state.topFilter = {job:'', level:'', kind:''};
    renderTopbar();
  });
}

/* ============== CONTENT ROUTER ============== */
function render(){
  renderNav();
  renderTopbar();
  if(document.getElementById('ai-context-bar')) setAIContextBar();
  const c = document.getElementById('content');
  switch(state.route.type){
    case 'home': c.innerHTML = renderHome(); attachHomeEvents(); break;
    case 'common': c.innerHTML = renderCommonDetail(state.route.name); attachCommonDetailEvents(state.route.name); break;
    case 'role': c.innerHTML = renderRoleDetail(state.route.name); break;
    case 'jobOverview': c.innerHTML = renderJobOverview(state.route.job); attachJobOverviewEvents(); break;
    case 'job': c.innerHTML = renderJobDetail(state.route.job, state.route.name); break;
    case 'myCompetencies': c.innerHTML = renderMyCompetencies(); attachMyCompEvents(); break;
    default: c.innerHTML = renderHome();
  }
}

/* ============== MY COMPETENCIES (filtered view) ============== */
function renderMyCompetencies(){
  const { job, level, kind } = state.route;
  if(!job && !level && !kind){
    return renderEmpty('상단에서 직무·직급·역량구분을 선택해주세요');
  }
  let sections = [];

  const showCommon = !kind || kind === 'common';
  const showRole = !kind || kind === 'role';
  const showJob = !kind || kind === 'job';

  if(showCommon){
    sections.push({
      title: '공통역량',
      color: 'var(--navy)',
      items: DATA.common.map(c => ({
        name: c.name, def: c.definition, go: {type:'common', name:c.name},
        behaviors: level ? (c.behaviors_by_level[level]||[]) : null
      }))
    });
  }
  if(showRole && level){
    const items = DATA.role.competencies.filter(c => c.level === level);
    sections.push({ title: `역할역량 — ${level}`, color: 'var(--teal)', items: items.map(c=>({name:c.name, def:c.definition, go:{type:'role', name:c.name}, behaviors:c.behaviors})) });
  } else if(showRole && !level){
    sections.push({ title: '역할역량 (직급을 선택하면 해당 단계만 표시돼요)', color: 'var(--teal)', items: DATA.role.competencies.map(c=>({name:`[${c.level}] ${c.name}`, def:c.definition, go:{type:'role', name:c.name}})) });
  }
  if(showJob && job){
    const j = JOB_BY_NAME[job];
    if(j){
      const items = level ? j.competencies.filter(c=>(c.level_buckets||[]).includes(level)) : j.competencies;
      sections.push({
        title: `직무역량 — ${j.org} · ${j.job}${level? ' · '+level : ''}`,
        color: 'var(--plum)',
        items: items.map(c=>({name:c.name, def:c.definition, go:{type:'job', job:j.job, name:c.name}, behaviors:c.behaviors}))
      });
    }
  } else if(showJob && !job){
    sections.push({ title:'직무역량 (직무를 선택하면 표시돼요)', color:'var(--plum)', items: [] });
  }

  const headerBits = [];
  if(job) headerBits.push(JOB_BY_NAME[job] ? JOB_BY_NAME[job].job : job);
  if(level) headerBits.push(level);

  return `
  <div class="breadcrumb">내 역량 보기</div>
  ${homeButtonHtml()}
  <div class="home-hero" style="margin-bottom:24px;">
    <div class="eyebrow">My Competencies</div>
    <h1 style="font-size:26px;">${headerBits.join(' · ') || '전체'} 역량 모아보기</h1>
    <p>선택하신 조건에 해당하는 역량을 한 곳에 모았습니다. 카드를 클릭하면 상세 행동지표·지식/기술/태도를 확인할 수 있어요.</p>
  </div>
  ${sections.map(renderMySection).join('')}
  `;
}

function renderMySection(sec){
  if(!sec.items.length){
    return `<div class="section-block" style="max-width:none;"><h2 style="color:${sec.color}">${sec.title}</h2><p style="color:var(--ink-faint); font-size:13.5px;">표시할 항목이 없습니다.</p></div>`;
  }
  return `<div class="section-block" style="max-width:none;">
    <h2 style="color:${sec.color}">${sec.title}</h2>
    <div class="job-ladder">
      <div class="ladder-comps" style="gap:10px;">
        ${sec.items.map(it => `
          <div class="comp-chip my-comp-card" style="max-width:280px; min-width:220px;"
               data-route='${JSON.stringify(it.go).replace(/'/g,"&#39;")}'>
            <div style="font-weight:700; margin-bottom:4px;">${escapeHtml(it.name)}</div>
            <div style="font-size:12px; color:var(--ink-faint); line-height:1.5; -webkit-line-clamp:2; display:-webkit-box; -webkit-box-orient:vertical; overflow:hidden;">${escapeHtml(it.def||'')}</div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
}

function attachMyCompEvents(){
  document.querySelectorAll('.my-comp-card').forEach(el => {
    el.addEventListener('click', () => {
      const route = JSON.parse(el.dataset.route.replace(/&#39;/g,"'"));
      go(route);
    });
  });

};

function buildSystemPrompt(){
  // Compact summary of dictionary so the model has grounding without sending 230KB every time.
  const jobList = DATA.jobs.map(j => `- ${j.org} / ${j.job}: ${j.competencies.map(c=>c.name).join(', ')}`).join('\n');
  const commonList = DATA.common.map(c=>`- ${c.name}: ${c.definition}`).join('\n');
  const roleList = DATA.role.competencies.map(c=>`- [${c.level}] ${c.name}: ${c.definition}`).join('\n');

  return `당신은 GB(아이의 책육아 성장을 지원하는 콘텐츠 기업)의 사내 "역량 AI 어시스턴트"입니다.
회사의 공식 역량체계(공통역량/역할역량/직무역량)를 기반으로 직원들의 역량 관련 질문에 답하고,
필요한 경우 web search 도구로 관련 직무교육·자격증·최신 교육 트렌드를 조사해서 추천해주세요.

[공통역량 4개]
${commonList}

[역할역량 14개 - 직급별]
${roleList}

[직무역량 - 18개 직무 217개 역량]
${jobList}

답변 원칙:
1. 질문이 특정 역량/직무/직급에 대한 것이면, 위 역량사전 내용을 근거로 정확하게 답변하세요. 역량 정의나 행동지표를 인용할 때는 위 목록의 표현을 최대한 활용하세요.
2. "이 역량 키우려면 어떤 교육이 좋을까?" 같은 질문에는, 먼저 역량사전 상의 필요 지식/기술/태도 관점에서 설명한 뒤, web_search로 실제 존재하는 관련 교육과정·자격증·최신 트렌드(예: 사내교육, 외부 교육플랫폼, 직무 관련 자격증, 업계 트렌드)를 조사해서 구체적으로 추천하세요.
3. 한국어로, 친근하지만 전문적인 어조로, 마크다운 간단 서식(굵게, 목록)을 사용해 답하세요. 너무 길게 늘어놓지 말고 핵심 위주로 답하세요.
4. 역량사전에 없는 내용을 추측해서 단정짓지 마세요. 모르면 모른다고 하고, web search로 보강하세요.
5. 실존하지 않는 자격증명, 통계, 출처를 지어내지 마세요.`;
}

function openAI(){
  document.getElementById('ai-overlay').classList.add('open');
  if(aiState.history.length === 0){
    renderAIWelcome();
  }
}
function closeAI(){
  document.getElementById('ai-overlay').classList.remove('open');
}

function renderAIWelcome(){
  const box = document.getElementById('ai-messages');
  box.innerHTML = `<div class="msg bot">
    안녕하세요! 👋 GB 역량사전 기반 AI 어시스턴트입니다.<br><br>
    역량의 정의·행동지표가 궁금하거나, 특정 역량을 키우기 위한 <b>교육·자격증·최신 트렌드</b>를 추천받고 싶다면 편하게 물어보세요.
  </div>`;
  renderSuggestChips([
    '개발 직무의 "제품 기획" 역량을 키우려면 어떤 교육이 좋을까요?',
    '선임 직급의 역할역량은 뭐가 있나요?',
    '마케팅 직무에 필요한 자격증 추천해줘',
    'IT개발운영 역량 키우는 최신 트렌드 알려줘'
  ]);
}

function renderSuggestChips(list){
  const wrap = document.getElementById('ai-suggest-chips');
  wrap.innerHTML = list.map(q => `<button class="suggest-chip">${escapeHtml(q)}</button>`).join('');
  wrap.querySelectorAll('.suggest-chip').forEach((btn,i) => {
    btn.addEventListener('click', () => { sendAIMessage(list[i]); });
  });
}

function setAIContextBar(){
  const bar = document.getElementById('ai-context-bar');
  let ctx = '';
  if(state.route.type==='job') { const j=JOB_BY_NAME[state.route.job]; ctx = j? `현재 보고 있는 역량: ${j.job} · ${state.route.name}` : ''; }
  else if(state.route.type==='role') ctx = `현재 보고 있는 역량: 역할역량 · ${state.route.name}`;
  else if(state.route.type==='common') ctx = `현재 보고 있는 역량: 공통역량 · ${state.route.name}`;
  else if(state.route.type==='jobOverview') ctx = `현재 보고 있는 직무: ${state.route.job}`;
  bar.textContent = ctx ? '📍 ' + ctx : '';
}

function simpleMarkdown(text){
  let h = escapeHtml(text);
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/gs, m => `<ul>${m}</ul>`);
  h = h.split(/\n{2,}/).map(p => p.startsWith('<ul>') ? p : `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  return h;
}

async function sendAIMessage(text){
  text = (text||'').trim();
  if(!text) return;
  const box = document.getElementById('ai-messages');
  document.getElementById('ai-suggest-chips').innerHTML = '';

  box.insertAdjacentHTML('beforeend', `<div class="msg user">${escapeHtml(text)}</div>`);
  aiState.history.push({role:'user', content: text});

  const loadingId = 'load-' + Date.now();
  box.insertAdjacentHTML('beforeend', `<div class="msg bot loading" id="${loadingId}">생각하는 중...</div>`);
  box.scrollTop = box.scrollHeight;

  try{
    const resp = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: buildSystemPrompt(),
        messages: aiState.history
      })
    });

    if(!resp.ok){
      let detail = '';
      try{ const errJson = await resp.json(); detail = errJson?.error?.message || JSON.stringify(errJson); }
      catch(_){ detail = await resp.text().catch(()=>''); }
      throw new Error(`API 응답 오류 (status ${resp.status})${detail ? ': ' + detail : ''}`);
    }

    const data = await resp.json();
    const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text);
    const answer = textBlocks.join('\n\n') || '죄송해요, 답변을 가져오지 못했어요. 다시 시도해주세요.';

    aiState.history.push({role:'assistant', content: answer});
    document.getElementById(loadingId).outerHTML = `<div class="msg bot">${simpleMarkdown(answer)}</div>`;
  }catch(err){
    aiState.history.pop();
    const msg = String(err && err.message || err);
    document.getElementById(loadingId).outerHTML = `<div class="msg bot">⚠️ <b>AI 응답을 가져오지 못했어요.</b><br><br>
      잠시 후 다시 시도해주세요. 문제가 지속되면 관리자에게 문의하세요.<br><br>
      <span style="font-size:11.5px; color:var(--ink-faint);">오류 상세: ${escapeHtml(msg)}</span>
    </div>`;
  }
  box.scrollTop = box.scrollHeight;
}

window.__askAIabout = function(compName){
  openAI();
  setTimeout(()=> sendAIMessage(`"${compName}" 역량을 키우기 위한 추천 교육과 관련 최신 트렌드를 알려줘.`), 150);
};

/* ============== INIT ============== */
function initAI(){
  document.getElementById('ai-launch-btn').addEventListener('click', () => { openAI(); setAIContextBar(); });
  document.getElementById('ai-close-btn').addEventListener('click', closeAI);
  document.getElementById('ai-overlay').addEventListener('click', (e) => { if(e.target.id==='ai-overlay') closeAI(); });

  const input = document.getElementById('ai-input');
  const sendBtn = document.getElementById('ai-send');
  const doSend = () => { const v = input.value; input.value=''; sendAIMessage(v); };
  sendBtn.addEventListener('click', doSend);
  input.addEventListener('keydown', (e) => {
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); doSend(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 90) + 'px';
  });
}

function initGlobalNav(){
  document.getElementById('brand-home-btn').addEventListener('click', () => go({type:'home'}));
  // delegated listener for any "처음으로" / "이전 페이지" buttons rendered into #content
  document.getElementById('content').addEventListener('click', (e) => {
    const backBtn = e.target.closest('[data-go-back]');
    if(backBtn){ goBack(); return; }
    const homeBtn = e.target.closest('[data-go-home]');
    if(homeBtn){ go({type:'home'}); return; }
  });
}

render();
initAI();
initGlobalNav();

</script>
