<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB 역량사전</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Pretendard:wght@400;500;600;700&display=swap');

  :root{
    --paper:#FAF7F0;
    --paper-deep:#F1EBDD;
    --ink:#23211C;
    --ink-soft:#5C584D;
    --ink-faint:#A39C8A;
    --rule:#DDD5C0;
    --rule-strong:#C7BCA0;

    --navy:#1F3447;
    --navy-deep:#142433;
    --teal:#2F6D5E;
    --teal-soft:#E7F0EB;
    --plum:#5B3A6B;
    --plum-soft:#EFE6F2;

    --damdang:#2E6FA7;
    --seonim:#3E8B5F;
    --chaegim:#C77A2E;
    --suseok:#7A4FA0;

    --damdang-soft:#E7F1F9;
    --seonim-soft:#E8F4EC;
    --chaegim-soft:#FBEDE0;
    --suseok-soft:#F1E8F6;

    --shadow-card: 0 1px 2px rgba(35,33,28,.06), 0 6px 20px -8px rgba(35,33,28,.15);
    --serif: 'Noto Serif KR', serif;
    --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--chaegim-soft);}

  #app{display:flex; height:100vh; overflow:hidden;}

  /* ============ SIDEBAR ============ */
  #sidebar{
    width:288px; flex-shrink:0;
    background:var(--navy-deep);
    color:#E9E4D8;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  #sidebar .brand{
    padding:24px 22px 18px;
    border-bottom:1px solid rgba(233,228,216,.12);
  }
  #sidebar .brand .mark{
    font-family:var(--serif); font-weight:700; font-size:21px; color:#fff;
    letter-spacing:.01em;
  }
  #sidebar .brand .sub{
    font-size:11.5px; color:#9FB0BE; margin-top:3px; letter-spacing:.04em;
  }

  #sidebar nav{flex:1; overflow-y:auto; padding:14px 12px 24px;}
  #sidebar nav::-webkit-scrollbar{width:6px;}
  #sidebar nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:3px;}

  .nav-group{margin-bottom:6px;}
  .nav-group summary.nav-group-btn{list-style:none;}
  .nav-group summary.nav-group-btn::-webkit-details-marker{display:none;}
  .nav-group-btn{
    width:100%; display:flex; align-items:center; gap:10px;
    cursor:pointer; user-select:none;
    padding:11px 10px; border-radius:10px;
    color:#D8D2C2; font-family:var(--sans); font-size:14px; font-weight:600;
    text-align:left;
  }
  .nav-group-btn .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .nav-group-btn .label{flex:1;}
  .nav-group-btn .chev{font-size:10px; opacity:.5; transition:transform .18s ease;}
  .nav-group-btn:hover{background:rgba(255,255,255,.05);}
  .nav-group[open] > .nav-group-btn .chev{transform:rotate(90deg);}

  .nav-sub{padding-left:8px; padding-top:2px;}

  .nav-sub-item{
    display:block; width:100%; text-align:left; background:none; border:none; cursor:pointer;
    padding:8px 10px 8px 24px; border-radius:8px;
    font-family:var(--sans); font-size:13px; color:#AEA89A;
    border-left:2px solid transparent;
    line-height:1.4;
  }
  .nav-sub-item:hover{color:#fff; background:rgba(255,255,255,.04);}
  .nav-sub-item.selected{color:#fff; background:rgba(255,255,255,.09); border-left-color:#fff;}

  .nav-sub-sub{padding-left:14px;}
  .nav-level-tag{
    font-size:10px; font-weight:700; letter-spacing:.03em; color:#7B8794;
    text-transform:uppercase; padding:10px 10px 4px 24px;
  }
  .nav-job-block{margin-bottom:1px;}
  .nav-job-block > summary.nav-job-item{list-style:none; cursor:pointer; user-select:none;}
  .nav-job-block > summary.nav-job-item::-webkit-details-marker{display:none;}
  .nav-job-block[open] .nav-job-expand-icon{transform:rotate(90deg);}
  .nav-job-row{display:flex; align-items:flex-start; gap:8px;}
  .nav-job-expand-icon{
    flex-shrink:0; width:16px; height:16px; display:flex; align-items:center; justify-content:center;
    font-size:10px; color:#8a8473; margin-top:2px; transition:transform .15s ease;
  }
  .nav-job-text{flex:1; line-height:1.35;}
  .nav-job-comps{padding-left:4px;}
  .nav-comp-item{font-size:12.5px; padding-left:34px;}

  .home-link-btn{
    width:100%; display:flex; align-items:center; gap:8px;
    background:none; border:1px solid rgba(233,228,216,.18); cursor:pointer;
    padding:9px 12px; border-radius:9px; margin-top:12px;
    color:#D8D2C2; font-family:var(--sans); font-size:12.5px; font-weight:600; text-align:left;
  }
  .home-link-btn:hover{background:rgba(255,255,255,.06); color:#fff;}

  .page-nav-btns{display:flex; gap:8px; margin-bottom:18px;}
  .back-home-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:#fff; border:1px solid var(--rule-strong); border-radius:9px;
    padding:8px 14px; font-size:12.5px; font-weight:600; color:var(--ink-soft);
    cursor:pointer; margin-bottom:0;
  }
  .back-home-btn:hover{border-color:var(--ink); color:var(--ink);}

  #sidebar .foot{
    padding:14px 20px 18px; border-top:1px solid rgba(233,228,216,.12);
  }
  .ai-launch{
    width:100%; display:flex; align-items:center; gap:10px;
    background:linear-gradient(135deg, #2F6D5E, #1F3447);
    border:1px solid rgba(255,255,255,.14);
    color:#fff; font-family:var(--sans); font-weight:600; font-size:13.5px;
    padding:11px 14px; border-radius:11px; cursor:pointer;
  }
  .ai-launch:hover{filter:brightness(1.08);}
  .ai-launch .ico{font-size:15px;}

  /* ============ MAIN ============ */
  #main{flex:1; display:flex; flex-direction:column; min-width:0; height:100vh;}

  #topbar{
    background:var(--paper); border-bottom:1px solid var(--rule);
    padding:14px 32px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    flex-shrink:0;
  }
  .topbar-label{font-size:12px; color:var(--ink-faint); font-weight:600; margin-right:2px;}
  select.filter-select{
    appearance:none; -webkit-appearance:none;
    font-family:var(--sans); font-size:13.5px; font-weight:500; color:var(--ink);
    background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%235C584D"/></svg>') no-repeat right 12px center;
    border:1px solid var(--rule-strong); border-radius:9px;
    padding:9px 32px 9px 13px;
    cursor:pointer; min-width:128px;
  }
  select.filter-select:focus{outline:2px solid var(--teal); outline-offset:1px;}
  .topbar-go{
    background:var(--ink); color:#fff; border:none; border-radius:9px;
    padding:9px 18px; font-family:var(--sans); font-weight:600; font-size:13.5px;
    cursor:pointer;
  }
  .topbar-go:hover{background:#000;}
  .topbar-reset{
    background:none; border:none; color:var(--ink-faint); font-size:12.5px;
    cursor:pointer; text-decoration:underline; padding:6px 4px;
  }

  #content{flex:1; overflow-y:auto; padding:38px 44px 80px;}
  #content::-webkit-scrollbar{width:10px;}
  #content::-webkit-scrollbar-thumb{background:var(--rule-strong); border-radius:5px;}

  .breadcrumb{font-size:12.5px; color:var(--ink-faint); margin-bottom:14px; letter-spacing:.01em;}
  .breadcrumb b{color:var(--ink-soft); font-weight:600;}

  /* ===== Home / chart page ===== */
  .home-hero{margin-bottom:34px;}
  .home-hero .eyebrow{
    font-size:12px; font-weight:700; letter-spacing:.12em; color:var(--teal); text-transform:uppercase;
  }
  .home-hero h1{
    font-family:var(--serif); font-size:34px; font-weight:700; margin:8px 0 10px; color:var(--ink);
  }
  .home-hero p{font-size:15px; color:var(--ink-soft); line-height:1.7; max-width:760px; margin:0;}

  .system-table{
    width:100%; border-collapse:separate; border-spacing:0;
    border:1px solid var(--rule-strong); border-radius:16px; overflow:hidden;
    box-shadow:var(--shadow-card); margin-bottom:40px; background:#fff;
  }
  .system-table th{
    font-family:var(--sans); font-size:13px; font-weight:700; color:#fff;
    padding:14px 16px; text-align:left;
  }
  .system-table th.col-rank{background:var(--ink); width:90px;}
  .system-table th.col-common{background:var(--navy);}
  .system-table th.col-role{background:var(--teal);}
  .system-table th.col-job{background:var(--plum);}
  .system-table td{
    padding:16px; border-top:1px solid var(--rule); font-size:13.5px; line-height:1.6; vertical-align:top;
  }
  .system-table tr:nth-child(odd) td{background:#FFFEFB;}
  .level-cell{display:flex; flex-direction:column; gap:2px;}
  .level-cell b{font-size:14px; font-weight:700;}
  .level-cell span{font-size:11.5px; color:var(--ink-faint);}
  .system-table .tags{display:flex; flex-wrap:wrap; gap:6px;}
  .system-table .tag{
    display:inline-block; padding:3px 10px; border-radius:99px; font-size:12.5px; font-weight:500;
    cursor:pointer; border:1px solid transparent;
  }
  .system-table .tag:hover{filter:brightness(.96);}
  .tag.c-common{background:var(--paper-deep); color:var(--navy);}
  .tag.c-role{background:var(--teal-soft); color:var(--teal);}
  .tag.c-job{background:var(--plum-soft); color:var(--plum);}
  .job-cell-note{font-size:12.5px; color:var(--ink-faint); font-style:italic;}
  .usage-row td{background:var(--paper-deep) !important; font-size:12.5px; color:var(--ink-soft);}

  .home-cards{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:8px;}
  .home-card{
    background:#fff; border:1px solid var(--rule); border-radius:14px; padding:22px;
    cursor:pointer; box-shadow:var(--shadow-card);
  }
  .home-card:hover{border-color:var(--rule-strong); transform:translateY(-1px);}
  .home-card .ico{font-size:22px; margin-bottom:10px; display:block;}
  .home-card h3{margin:0 0 6px; font-family:var(--serif); font-size:17px;}
  .home-card p{margin:0; font-size:13px; color:var(--ink-soft); line-height:1.6;}

  /* ===== Competency detail ===== */
  .comp-header{margin-bottom:24px;}
  .comp-badges{display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap;}
  .badge{
    display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:99px;
    font-size:12px; font-weight:600;
  }
  .badge.b-common{background:var(--paper-deep); color:var(--navy);}
  .badge.b-role{background:var(--teal-soft); color:var(--teal);}
  .badge.b-job{background:var(--plum-soft); color:var(--plum);}
  .badge.b-level-담당{background:var(--damdang-soft); color:var(--damdang);}
  .badge.b-level-선임{background:var(--seonim-soft); color:var(--seonim);}
  .badge.b-level-책임{background:var(--chaegim-soft); color:var(--chaegim);}
  .badge.b-level-수석{background:var(--suseok-soft); color:var(--suseok);}

  .comp-header h1{font-family:var(--serif); font-size:30px; margin:4px 0 14px;}
  .comp-def{
    font-size:15px; line-height:1.75; color:var(--ink-soft);
    background:var(--paper-deep); border-left:3px solid var(--rule-strong);
    padding:16px 20px; border-radius:0 10px 10px 0; max-width:820px;
  }

  .section-block{margin-top:30px; max-width:820px;}
  .section-block h2{
    font-family:var(--sans); font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:var(--ink-faint); margin:0 0 12px; display:flex; align-items:center; gap:8px;
  }
  .section-block h2::after{content:""; flex:1; height:1px; background:var(--rule);}

  .behavior-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px;}
  .behavior-list li{
    display:flex; gap:12px; font-size:14.5px; line-height:1.65; color:var(--ink);
    background:#fff; border:1px solid var(--rule); border-radius:10px; padding:13px 16px;
  }
  .behavior-list li .num{
    flex-shrink:0; width:22px; height:22px; border-radius:50%; background:var(--paper-deep); color:var(--ink-soft);
    font-size:11.5px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px;
  }

  .level-tabs{display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;}
  .level-tab{
    padding:7px 16px; border-radius:99px; border:1px solid var(--rule-strong); background:#fff;
    font-size:13px; font-weight:600; cursor:pointer; color:var(--ink-soft);
  }
  .level-tab.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  .ksa-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .ksa-card{background:#fff; border:1px solid var(--rule); border-radius:12px; padding:16px 18px;}
  .ksa-card h3{font-size:12.5px; margin:0 0 10px; font-weight:700; color:var(--ink-soft); display:flex; align-items:center; gap:6px;}
  .ksa-card ul{margin:0; padding:0 0 0 18px; font-size:13.5px; line-height:1.7; color:var(--ink);}
  .ksa-card.atti{grid-column:1 / -1;}
  .cert-line{font-size:13.5px; color:var(--ink-soft); display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .cert-chip{background:var(--paper-deep); padding:4px 11px; border-radius:7px; font-size:12.5px;}

  /* ===== Job overview page ===== */
  .job-hero{
    background:#fff; border:1px solid var(--rule); border-radius:16px; padding:26px 28px; margin-bottom:26px;
    box-shadow:var(--shadow-card);
  }
  .job-hero .org{font-size:12px; color:var(--ink-faint); font-weight:600; letter-spacing:.03em;}
  .job-hero h1{font-family:var(--serif); font-size:26px; margin:4px 0 10px;}
  .job-hero .slogan{font-size:14.5px; color:var(--teal); font-weight:600; margin-bottom:10px;}
  .job-hero .role-desc{font-size:13.5px; line-height:1.7; color:var(--ink-soft);}

  .job-ladder{display:flex; flex-direction:column; gap:14px;}
  .ladder-row{display:flex; gap:16px; align-items:flex-start;}
  .ladder-level{
    flex-shrink:0; width:96px; padding:8px 0; text-align:center; border-radius:10px;
    font-size:13px; font-weight:700;
  }
  .ladder-comps{flex:1; display:flex; flex-wrap:wrap; gap:8px;}
  .comp-chip{
    background:#fff; border:1px solid var(--rule); border-radius:10px; padding:10px 14px;
    font-size:13.5px; font-weight:500; cursor:pointer; max-width:340px;
  }
  .comp-chip:hover{border-color:var(--plum); color:var(--plum);}

  /* ===== Empty state ===== */
  .empty-state{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:90px 20px; text-align:center; color:var(--ink-faint);
  }
  .empty-state .ico{font-size:34px; margin-bottom:14px;}
  .empty-state h3{font-family:var(--serif); font-size:19px; color:var(--ink-soft); margin:0 0 6px;}
  .empty-state p{font-size:13.5px; max-width:340px; line-height:1.6;}

  /* ============ AI PANEL ============ */
  #ai-overlay{
    position:fixed; inset:0; background:rgba(20,18,14,.4); z-index:50;
    display:none; align-items:stretch; justify-content:flex-end;
  }
  #ai-overlay.open{display:flex;}
  #ai-panel{
    width:min(480px, 92vw); background:var(--paper); height:100%;
    display:flex; flex-direction:column; box-shadow:-8px 0 40px rgba(0,0,0,.18);
    animation:slidein .22s ease;
  }
  @keyframes slidein{from{transform:translateX(24px); opacity:.4;} to{transform:translateX(0); opacity:1;}}

  #ai-head{
    padding:18px 20px; border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:10px;
    background:linear-gradient(135deg, var(--navy), var(--teal)); color:#fff;
  }
  #ai-head .ico{font-size:18px;}
  #ai-head .ttl{font-family:var(--serif); font-size:16.5px; font-weight:700; flex:1;}
  #ai-head .close-btn{background:rgba(255,255,255,.15); border:none; color:#fff; width:28px; height:28px; border-radius:8px; cursor:pointer; font-size:15px;}

  #ai-messages{flex:1; overflow-y:auto; padding:18px 18px 8px; display:flex; flex-direction:column; gap:14px;}
  .msg{max-width:92%; font-size:13.8px; line-height:1.65;}
  .msg.user{align-self:flex-end; background:var(--ink); color:#fff; padding:10px 14px; border-radius:14px 14px 3px 14px;}
  .msg.bot{align-self:flex-start; background:#fff; border:1px solid var(--rule); padding:12px 15px; border-radius:14px 14px 14px 3px; color:var(--ink);}
  .msg.bot.loading{color:var(--ink-faint); font-style:italic;}
  .msg.bot a{color:var(--teal);}
  .msg.bot p{margin:0 0 8px;}
  .msg.bot p:last-child{margin-bottom:0;}
  .msg.bot ul{margin:4px 0 8px; padding-left:18px;}
  .msg.bot strong{color:var(--ink);}
  .ai-suggest-chips{display:flex; flex-wrap:wrap; gap:6px; padding:0 18px 14px;}
  .suggest-chip{
    background:#fff; border:1px solid var(--rule-strong); border-radius:99px; padding:6px 12px;
    font-size:12px; cursor:pointer; color:var(--ink-soft);
  }
  .suggest-chip:hover{border-color:var(--teal); color:var(--teal);}

  #ai-context-bar{
    padding:8px 18px; font-size:11.5px; color:var(--ink-faint); border-top:1px solid var(--rule); background:var(--paper-deep);
  }
  #ai-input-row{
    padding:14px 16px; border-top:1px solid var(--rule); display:flex; gap:8px; background:#fff;
  }
  #ai-input{
    flex:1; border:1px solid var(--rule-strong); border-radius:11px; padding:11px 14px; font-size:13.5px;
    font-family:var(--sans); resize:none; max-height:90px;
  }
  #ai-input:focus{outline:2px solid var(--teal); outline-offset:1px;}
  #ai-send{
    background:var(--ink); color:#fff; border:none; border-radius:11px; padding:0 18px; font-weight:600; cursor:pointer; font-size:13.5px;
  }
  #ai-send:disabled{opacity:.4; cursor:default;}

  @media (max-width: 880px){
    #sidebar{position:fixed; left:0; top:0; bottom:0; z-index:40; transform:translateX(-100%); transition:transform .2s ease;}
    #sidebar.open{transform:translateX(0);}
    .ksa-grid{grid-template-columns:1fr;}
    .home-cards{grid-template-columns:1fr;}
    #content{padding:24px 18px 60px;}
    #mobile-menu-btn{display:flex !important;}
  }
  #mobile-menu-btn{
    display:none; align-items:center; justify-content:center;
    width:36px; height:36px; border-radius:9px; border:1px solid var(--rule-strong); background:#fff; cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">

  <aside id="sidebar">
    <div class="brand" id="brand-home-btn" style="cursor:pointer;">
      <div class="mark">GB 역량사전</div>
      <div class="sub">Competency Dictionary</div>
    </div>
    <nav id="nav"></nav>
    <div class="foot">
      <button class="ai-launch" id="ai-launch-btn">
        <span class="ico">✦</span> 역량 AI에게 물어보기
      </button>
    </div>
  </aside>

  <main id="main">
    <div id="topbar"></div>
    <div id="content"></div>
  </main>

</div>

<div id="ai-overlay">
  <div id="ai-panel">
    <div id="ai-head">
      <span class="ico">✦</span>
      <span class="ttl">역량 AI 어시스턴트</span>
      <button class="close-btn" id="ai-close-btn">✕</button>
    </div>
    <div id="ai-messages"></div>
    <div class="ai-suggest-chips" id="ai-suggest-chips"></div>
    <div id="ai-context-bar"></div>
    <div id="ai-input-row">
      <textarea id="ai-input" rows="1" placeholder="역량에 대해 무엇이든 물어보세요..."></textarea>
      <button id="ai-send">전송</button>
    </div>
  </div>
</div>

<script>
window.GB_DATA = {"common":[{"name":"창의적 사고","core_value":"Create","definition":"다양한 관점에서 사고하고 새로운 아이디어 혹은 업무 방식을 도출·제안하 며, 이를 구체화시켜 업무에 적용하려는 자세와 능력","behaviors_by_level":{"담당":["기존 방식에 의문을 갖고 더 나은 방법을 찾으려 시도한다.","업무 중 떠오른 아이디어를 팀 내에서 적극적으로 제안한다."],"선임":["업무 문제를 다양한 관점에서 분석하고 기존과 다른 해결 방식을 적용해본다.","새로운 아이디어를 구체적인 실행 계획으로 발전시킨다."],"책임":["팀의 업무 방식과 프로세스를 창의적으로 개선하고 그 결과를 성과로 연결한다.","구성원들이 아이디어를 자유롭게 낼 수 있는 환경을 만든다."],"수석":["시장·고객·조직 변화를 읽고 새로운 사업 방식이나 콘텐츠 방향을 제시한다.","조직의 창의적 사고 문화를 선도한다."]}},{"name":"긍정과 열정","core_value":"Create","definition":"긍정적인 마인드로 자기 일에 자부심을 갖고 주도적으로 도전하며 발전을 위해 지속적으로 노력하는 자세와 능력","behaviors_by_level":{"담당":["어려운 상황에서도 긍정적인 태도를 유지하며 맡은 업무에 최선을 다한다.","실패를 두려워하지 않고 새로운 도전을 시도한다."],"선임":["자신의 업무에 자부심을 갖고 높은 기준을 스스로 설정하여 달성하려 노력한다.","주변 동료에게 긍정적인 에너지를 전달한다."],"책임":["불확실한 상황에서도 팀의 사기를 유지하고 도전적인 목표를 긍정적으로 추진한다.","구성원의 도전을 격려하고 실패를 성장의 기회로 전환시킨다."],"수석":["조직에 도전과 성장의 문화를 조성하고 솔선수범으로 열정을 보여준다.","어려운 경영 환경에서도 조직의 방향성에 대한 확신을 구성원과 공유한다."]}},{"name":"소통과 협업","core_value":"Associate","definition":"열린 마음으로 타인의 의견을 경청하고 소통하며, 함께 하는 가치를 알고 타 인 및 타 부서를 존중하며 적극적으로 협업하는 자세와 능력","behaviors_by_level":{"담당":["상대방의 말을 끝까지 경청하고 자신의 의견을 명확하게 전달한다.","팀 내 업무 협조 요청에 적극적으로 응한다."],"선임":["타 부서와의 업무 협력 시 서로의 입장을 이해하고 원활하게 조율한다.","회의나 토론에서 건설적인 의견을 제시하고 합의를 이끌어낸다."],"책임":["팀 내 소통 문화를 만들고 구성원 간 정보가 원활하게 공유되도록 한다.","타 부서와의 협업 과제에서 중심 역할을 수행하고 성과를 만들어낸다."],"수석":["조직 내 수평적 소통 문화를 조성하고 경영진과 현장 사이의 가교 역할을 한다.","부서 간 이해관계 충돌 시 조직 전체 관점에서 조율하고 통합한다."]}},{"name":"고객중심","core_value":"Devote","definition":"모든 업무를 고객의 입장에서 생각하고 고객의 요구 및 문제를 능동적으로 파악하여 고객이 중요하게 생각하는 가치를 제공하고 향상시키고자 하는 자 세와 능력","behaviors_by_level":{"담당":["고객 응대 및 업무 진행시 항상 고객 입장에서 생각하고 불편함을 신속하게 해결하려 노력한다.","고객의 피드백을 업무 개선에 반영한다."],"선임":["고객의 표면적 요구 너머 본질적인 니즈를 파악하고 선제적으로 대응한다.","자신의 업무 결과물이 최종 고객에게 어떤 가치를 주는지 인식하며 일한다."],"책임":["팀의 업무 프로세스를 고객 관점에서 점검하고 개선 방향을 제시한다.","고객 가치 창출을 팀 목표와 연계하여 운영한다."],"수석":["고객 중심 사고를 조직 문화로 정착시키고 의사결정의 핵심 기준으로 삼는다.","시장과 고객 변화를 선도적으로 읽고 사업 및 업무 진행 방향에 반영한다."]}}],"role":{"level_definitions":{"담당":"담당업무에 대한 개념 지식과 기능을 기초로 직무 경험을 쌓고 전문지식을 강화하며 제일선의 업무수 행자로서 실무를 담당하는 단계","선임":"단위 업무를 단독으로 수행하고 책임질 수 있으며, 창의적 사고와 문제해결 능력을 통해 직무 역량을 강 화하고 본인에게 주어진 성과 목표를 전략적으로 실행할 수 있는 단계","책임":"성과창출 소 단위의 조직(파트, 프로젝트 등)을 책임질 수 있으며, 고객가치 창출과 성과관리 책임자 역 할을 수행하고 하위 직급에 대한 멘토링과 코칭을 통해 성장을 지원하는 단계","수석":"다양한 직무경험을 통하여 넓은 시야와 관리역량을 보유하고, 업무에 대한 전문성과 리더십을 발휘하 여 경영 과제를 해결하고 단위조직의 성과창출을 이끄는 단계"},"competencies":[{"name":"대인관계","level":"담당","definition":"내/외부 고객을 비롯한 업무상 접하게 되는 타인 및 조직에 대한 폭넓은 이해를 가지고 본인의 업무 수 행 및 조직성과 향상에 유익한 인간관계를 형성하는 능력","behaviors":["업무수행을 위해 사내외적으로 관계형성이 필요한 대상에 대해 파악하고 있다.","고객 응대 시 상황에 맞는 행동요령을 숙지하고 실천한다.","업무와 관계된 동료 및 상사와 원만한 관계를 유지한다.","개방적인 사고로 타인의 의견을 적극 수용하고 타인의 입장에서 이해하려고 노력한다.","처음 만나는 사내/외 관계자에게 먼저 다가가 긍정적인 첫인상을 형성하려 노력한다.","업무 관련 갈등이나 오해가 생겼을 때 회피하지 않고 대화로 해결하려 시도한다."]},{"name":"분석적 사고","level":"담당","definition":"문제나 상황의 여러 부분을 다양한 관점에서 논리적으로 생각하고 이를 바탕으로 체계적으로 업무를 수행하는 능력","behaviors":["업무 수행에 필요한 자료를 수집하고 분류한다.","주어진 문제들 간의 기본적인 관계를 파악하여 중요도에 따라 정리할 수 있다.","업무추진 시 발생하는 문제 상황의 원인을 파악하려고 시도한다.","하나의 문제를 여러 각도에서 생각해보고 단순하게 결론 내리지 않으려 노력한다.","업무 지시나 요청의 의도와 배경을 파악하고 그에 맞게 업무를 수행한다.","자료나 수치를 그대로 받아들이지 않고 내용의 정확성과 타당성을 확인한다."]},{"name":"주도성","level":"담당","definition":"적극성과 도전의식을 보유하고 적극적으로 업무를 수행하며 높은 성과 기준을 달성하기 위하여 끊임없 이 노력하는 태도와 능력","behaviors":["본인이 맡은 업무는 책임감을 가지고 적극적이고 주도적으로 수행한다.","업무 진행 상황을 스스로 파악하고 경과를 보고하며 필요시 대안을 제시한다.","상사의 요구나 지시를 받기 전에 문제점을 찾아 스스로 업무를 추진하고 개선한다.","도전적인 업무 목표를 세우고 목표를 달성하기 위해 노력한다.","역량(기술, 지식, 능력) 향상을 위해 스스로 꾸준히 자기개발한다.","주어진 업무 안에서 더 나은 방법을 찾으려 시도하고 작은 개선을 실천한다.","맡은 업무를 중간에 포기하지 않고 기한 내에 완수하며, 결과에 대해 스스로 책임진다."]},{"name":"자기관리","level":"선임","definition":"자신의 업무 우선순위와 시간을 스스로 계획하고 조절하며, 감정과 태도를 안정적으로 유지하여 주어 진 성과 목표를 일관성 있게 실행해 나가는 능력","behaviors":["맡은 업무의 우선순위를 스스로 판단하고 기한 내에 완료될 수 있도록 일정을 계획한다.","여러 업무가 동시에 주어졌을 때 중요도와 긴급도를 고려하여 순서를 정하고 처리한다.","업무 중 스트레스나 어려운 상황에서도 안정적인 태도를 유지하며 업무에 임한다.","부정적인 피드백을 받았을 때 감정적으로 반응하지 않고 개선의 기회로 받아들인다.","주어진 성과 목표를 달성하기 위한 실행 계획을 스스로 수립하고 진행 상황을 점검한다.","목표 달성에 방해가 되는 요소를 스스로 파악하고 제거하려 노력한다.","자신의 강점과 보완이 필요한 부분을 객관적으로 파악하고 업무에 반영한다.","반복적으로 발생하는 실수나 비효율을 인식하고 스스로 개선 방법을 찾는다."]},{"name":"문제해결","level":"선임","definition":"업무추진 또는 목표 달성 시 발생하는 문제에 대한 정확한 원인을 파악하고 적절한 정보 및 자원을 활용 하여 적기에 문제를 해결·처리하는 능력","behaviors":["주어진 문제의 핵심 요인을 정확하게 파악할 수 있다.","업무에 있어 문제해결을 위한 기본적인 절차(process)를 알고 있다.","규정된 절차나 매뉴얼에 따라 문제를 처리하며, 필요시 상사의 도움을 적절하게 받고 있다.","팀 내/외부 또는 고객으로부터 자료나 정보를 입수하여 문제 해결에 활용한다.","주어진 문제에 대한 근본 원인을 분석하여 구체화·명료화 시킬 수 있다.","유사한 문제가 반복될 경우 패턴을 인식하고 스스로 해결 방법을 찾으려 시도한다.","문제 해결 후 결과를 검토하고 더 나은 방법이 있었는지 스스로 되돌아본다.","혼자 해결하기 어려운 문제는 적절한 시점에 상사나 동료에게 도움을 요청하여 처리한다."]},{"name":"전문성 추구","level":"선임","definition":"자신에게 필요한 역량 및 skill이 무엇인지 정확하게 파악하고 전문적인 지식과 기술을 습득하기 위해 지속적으로 학습하고 자기개발하는 능력","behaviors":["업무 수행을 위해 자신에게 필요한 역량이나 기술이 무엇인지 파악하고 있다.","업계에서 일반적으로 쓰이는 전문용어를 알고 있다.","업무에 필요한 기본적 기술을 이해하며 보유하고 있다.","업무와 관련한 교육 프로그램에 참석하여 지식을 습득한다.","업무 지식 및 정보를 실무에 적절하게 적용하고 있다.","자신의 강점과 개발이 필요한 부분을 스스로 파악하고 개인 학습 계획을 세워 실행한다.","업무에서 겪은 시행착오와 성공 경험을 정리하여 자신만의 노하우로 축적한다.","관련 분야의 최신 트렌드를 꾸준히 모니터링하고 업무에 적용 가능한 부분을 찾는다."]},{"name":"동기부여","level":"책임","definition":"부하 직원들이 업무에서 성과를 발휘할 수 있도록 유도하고 업무 결과에 대한 피드백을 제공하거나 발 전을 위해 독려하는 능력","behaviors":["구성원들에게 일의 목적과 목표를 잘 설명하고 공감할 수 있도록 한다.","구성원들에게 적절한 피드백을 제공하여 일을 잘할 수 있도록 돕는다.","구성원들이 자율적으로 일을 하고 성취감을 느낄 수 있도록 적절한 권한위임을 한다.(리더)","구성원들이 업무를 추진하는 과정에서 다양한 관점에서 사고하도록 도와준다.","구성원들이 업무상 겪는 어려움을 파악하고 적합한 해결 방향을 함께 모색한다.","부하직원의 고민과 어려움을 이해하고 적극적으로 돕는다.","구성원 개인의 성장 목표와 조직의 방향을 연계하여 균형 있는 방향을 제시한다.(리더)","목표달성과정에서 자신감 및 성취감을 느낄 수 있도록 칭찬과 긍정적인 피드백을 제공한다.","구성원의 업무 성과와 기여를 팀 내에서 적절히 인정하고 가시화한다.(리더)","구성원별 동기 유발 요인이 다름을 인식하고 개인에 맞는 방식으로 독려한다."]},{"name":"전략적 사고","level":"책임","definition":"성과목표 달성을 위해 자사, 경쟁사, 시장 등의 전략적 요소를 분석하고 결과를 바탕으로 최적의 대안 을 모색하고 해결방안을 찾는 능력","behaviors":["조직의 목표와 경영전략을 정확하게 이해하고 있다.","경영전략 속에서 자신의 업무가 차지하는 위치와 목적 그리고 목표를 정확히 이해하고 있다.","자신의 업무와 관련된 비즈니스 동향(Trend) 및 타사 사례를 주기적으로 파악한다.","팀의 업무계획 달성을 위해 자신의 업무 목표 및 업무 추진 계획을 효율적으로 수립한다.","조직 내 개별 업무가 전략과 어떻게 상호 연계되는지를 이해하고 있다.","팀 업무에 영향을 미치는 내외부 환경 변화를 파악하고 대응 방향을 팀원들과 공유한다.","단기 성과와 중장기 목표의 균형을 고려하여 팀의 업무 우선순위를 조정한다.","자사와 경쟁사의 강약점을 분석하여 팀 업무의 차별화 방향을 도출한다."]},{"name":"업무추진력","level":"책임","definition":"회사의 목표와 부서의 목표를 명확하게 인식하고 구체적 사실과 정보, 자료에 근거하여 신속하고 정확 하게 업무 방향을 결정하고 추진하는 능력","behaviors":["회사의 목표와 전략을 명확하게 인식하고 있다.","장애요인이 있더라도 문제 해결 노력을 통해 최종 결과를 도출한다.","회사와 상위 조직의 목표를 명확하게 인식하고 이해 부합되도록 우선순위를 정하여 업무를 진행한 다.","의사결정이 내려지면 주저하지 않고 실행에 옮긴다.","중요한 결정을 내리기 전에 관련된 모든 자료와 정보를 수집하고 검토한다.","팀의 업무 목표를 구성원별 역할로 구체화하고 실행 계획을 수립하여 추진한다.(리더)","업무 진행 상황을 주기적으로 점검하고 지연 요소를 사전에 파악하여 대응한다.","팀 내 업무 배분을 효율적으로 조정하여 목표 달성을 위한 자원을 최적화한다.(리더)"]},{"name":"갈등관리","level":"책임","definition":"팀 내외부에서 발생하는 이견과 갈등 상황을 조기에 감지하고, 각 당사자의 입장을 균형 있게 파악하여 대화와 타협을 통해 건설적인 합의점을 도출하는 능력","behaviors":["갈등상황을 인지하고 다각적/객관적 정보를 바탕으로 갈등 당사자들의 입장과 상황을 정확히 파악 한다.","개인적 편견을 가지지 않고 갈등을 바라본다.","갈등의 핵심요인을 파악하고 갈등 해결을 위한 Process를 알고 있다.","갈등 관계자들의 입장 차이를 정확히 파악하여 해결점을 찾으려고 노력한다.","도출된 해결점에 맞추어 자신의 관점, 입장을 조절한다.","항상 개방적인 의견 교류와 솔직한 대화를 통해 갈등의 소지를 최소화한다.","실질적인 의견대립이나 의견충돌을 개방적이고 협력적인 방식으로 해결한다.","팀 내 잠재적 갈등 요소를 미리 파악하고 사전에 소통하여 갈등 발생을 예방한다.","갈등 해결 후 당사자 간 관계 회복을 위해 후속 소통을 이어간다.","갈등 해결 과정에서 어느 한쪽에 치우치지 않고 중립적인 입장을 유지한다."]},{"name":"변화주도","level":"수석","definition":"변화의 목적과 방향을 정해 추진하고 공유·모니터링함으로써 조직이 긍정적인 변화를 추구하는 태도 및 의지","behaviors":["변화의 방향 및 변화관리 전략에 대한 의견을 제시한다.","변화를 기회로 보고 수용하게 하며, 변화에 능동적으로 대처한다.","이해 관계자들을 통해 새로운 변화와 관련된 그들의 의견을 정기적으로 수집한다.","변화에 대한 핵심적인 저항 원인을 분석하고 해결방안을 도출한다.","이해 관계자들에게 맞는 메시지 및 전달 수단을 개발한다.","지속적 변화를 추진할 수 있는 체계를 구축한다.","장기적 변화와 관련된 주요 단계별 변화관리 전략을 수립한다.","변화 추진 과정에서 구성원의 불안과 저항을 공감하고 심리적 안전감을 형성한다.","변화의 성과를 가시화하고 구성원들과 공유하여 변화 동력을 지속적으로 유지한다."]},{"name":"성과관리","level":"수석","definition":"단위 조직의 목표를 구성원별 역할과 연계하여 구체적인 성과 지표로 설정하고, 진행 과정을 지속적으 로 모니터링하며 피드백과 지원을 통해 조직 전체의 성과를 달성하는 능력","behaviors":["조직의 전략 방향에 근거하여 단위 조직의 성과 목표를 구체적이고 측정 가능하게 설정한다.","팀 목표를 구성원별 역할과 강점에 맞게 배분하고 개인 목표와 연계한다.","성과 목표 대비 진행 상황을 주기적으로 점검하고 이슈를 조기에 파악하여 대응한다.","목표 달성을 저해하는 내외부 장애요인을 사전에 파악하고 제거 방안을 마련한다.","구성원의 성과 결과에 대해 구체적이고 공정한 피드백을 정기적으로 제공한다.","성과가 미흡한 구성원에게는 원인을 함께 분석하고 개선 방향을 코칭한다.","우수한 성과를 낸 구성원을 적절히 인정하고 보상과 연계될 수 있도록 지원한다.","팀 내 성과에 대한 명확한 기준과 공정한 평가 문화를 정착시킨다.","단기 성과와 중장기 목표의 균형을 고려하여 지속 가능한 성과 창출 체계를 구축한다."]},{"name":"비전제시","level":"수석","definition":"조직의 장기 사업목표와 전략을 바탕으로 단위 조직의 비전을 스스로 수립하고, 구성원들이 방향성에 공감하고 몰입할 수 있도록 명확하게 제시하며 지속적으로 동기를 부여하는 능력","behaviors":["조직이 추구하는 전략적, 장기적 목표와 비전을 구성원들이 정확히 인식할 수 있도록 명확하게 제시 하고 공감대를 형성한다.","조직의 비전을 구체화하고 실현할 수 있도록 자원을 관리하고 조정한다.","구성원들이 회사 내에서 자신의 비전을 설정하고 이를 추구할 수 있도록 코칭한다.","회사의 장기적 비전 수행을 위한 구체적인 액션 플랜 및 제도적 지원 방안을 모색하고 수립한다.","잦은 소통을 통해 구성원들의 공헌이 조직의 목표에 어떻게 영향을 미치는지 구체적으로 제시한다.","사업 환경과 조직 역량을 분석하여 단위 조직의 중장기 비전을 스스로 수립하고 경영진과 공유한다.","비전 달성 과정에서 구성원들이 의미와 성취감을 느낄 수 있도록 중간 성과를 지속적으로 공유하고 격려한다.","조직 비전이 구성원 개개인의 성장 방향과 연결될 수 있도록 개인별 목표 설정을 지원한다."]},{"name":"부하육성","level":"수석","definition":"조언과 지도를 통하여 조직원의 전문성을 배양하고 성과를 향상시킬 수 있는 역량을 습득할 수 있도록 지원하는 능력","behaviors":["팀 구성원들의 업무에 도움이 되는 정보와 경험을 적극적으로 공유하고 성장을 위한 방향을 제시한 다.","구성원들과 인간적으로 가까운 관계를 맺으며 공정하게 대한다.","학습분위기를 조성하고 직원들을 교육시키며 역량을 강화한다.","업무상의 애로사항을 구체적으로 청취하고 스스로 해결방안을 찾을 수 있도록 코칭한다.","업무 내용과 관련한 자신의 경험이나 지식을 적극적으로 전달한다.","구성원 성과 향상과 역량 개발을 위해 장애요인을 제거하고 지속적인 지도와 육성 방안을 모색한다.","구성원의 강점과 약점을 파악하고 있으며 성과 향상에 필요한 역량을 명확하게 알고 있다.","구성원의 역량 개발을 위한 체계적인 계획이 수립되어 있다.","구성원의 보유한 역량과 지식을 활용할 수 있는 업무 과제를 부여하고 있다.","구성원의 잠재적 역량을 확인하고 잠재력을 확대시킬 수 있는 학습 방안, 업무 수행 향상을 위한 도 전적인 과제를 부여한다.","구성원이 실패를 두려워하지 않고 도전할 수 있도록 심리적 안전감을 제공한다.","육성한 구성원이 다음 직급에서 필요한 역량을 갖출 수 있도록 중장기 성장 경로를 함께 설계한다."]}]},"jobs":[{"org":"개발실","job":"개발","slogan":"아이의 책육아 성장을 지원하는 남다른 콘텐츠를 만든다","role":"중기 제품 포트폴리오를 설계하고 개발 로드맵을 수립하여 체계적인 제품 개발을 주관한다. 고품질의 차별화된 콘텐츠를 기획·개발하여 시장에서 통하는 히트 상품을 창출한다. 자체 개발 역량을 지속적으로 강화하고 외부 네트워크를 활성화하여 다양성과 고객지향성을 추구 한다. 구매 전환율과 고객반응 극대화를 목표로 데이터에 기반한 개발 방안을 수립한다.","competencies":[{"name":"중장기 포트폴리오 수립","definition":"유아동 시장 트렌드와 고객 이해를 바탕으로 신규 아이템을 발굴하고, 중기 제품 포트폴리오 를 설계하여 경쟁력 있는 제품 라인업을 구축하는 역량","behaviors":["유아동 시장 트렌드와 고객 니즈를 분석하여 신규 아이템 발굴 기회를 도출할 수 있다.","발굴된 아이템의 시장성·경쟁력·수익성을 검토하여 개발 여부를 판단할 수 있다.","중기 제품 포트폴리오를 설계하고 제품 라인업의 균형과 완성 "선임"],"level_display":"선임"},{"name":"원고 교정·교열","definition":"맞춤법 원칙과 출판사 교정원칙에 따라 원고를 교정하고, 문장 가독성을 고려한 교열과 함께 제목 뽑기·목차 정리·핵심 키워드 요약 등 원고를 완성도 있게 정리하는 역량","behaviors":["맞춤법 원칙과 교정 원칙에 따라 원고를 대조하여 잘못된 부분을 바로잡을 수 있다.","문장 가독성을 고려한 교열을 수행하고 어색한 표현을 자연스럽게 수정할 수 있다.","여러 방식의 글 서술을 보고 주제와 적합한 글 구성 및 문장 완성도의 수준을 파악할 수 있다.","적합한 제목 뽑기, 목차 정리하기 등을 할 수 있다.","글의 내용을 한두 문장으로 요약하고 핵심 키워드로 제시할 수 있다.","교정·교열 후 수정 내용을 원고에 명확하게 표기하고 담당자에게 전달할 수 있다.","동일한 교정 기준이 원고 전체에 일관성 있게 적용되었는지 최종 확인할 수 있다."],"knowledge":["한국어 어문규정 및 맞춤법 규정","출판사 교정·교열 원칙 및 기준","문장 구성 및 가독성 원리","편집 지침 및 면별 편집 요소"],"skill":["원고 교정·교열 능력","제목 뽑기 및 목차 구성 능력","핵심 내용 요약 및 키워드 도출 능력","편집 요소 확인 및 검수 능력"],"attitude":["원고의 오류를 놓치지 않으려는 꼼꼼한 자세","독자 입장에서 가독성을 높이려는 노력","교정·교열 기준을 일관성 있게 적용하려는 자세"],"certs":[],"level":"담당","level_raw":"담당","level_buckets":["담당"],"level_display":"담당"},{"name":"편집 실무 이해","definition":"편집 지침에 따라 면별 편집 요소를 파악·확인하고, 책의 사양별 특징과 기획의도의 연관성을 이해하여 편집 실무를 수행하는 역량","behaviors":["편집 지침에 따른 각 면별 편집 요소를 파악하고 확인할 수 있다.","책의 사양별 특징을 알고 각각의 사양이 책의 기획의도와 어떻게 연관되는지 이해할 수 있다.","원고의 레이아웃 구성 요소(텍스트·이미지 배치 등)를 파악하고 편집 기준에 맞게 작업할 수 있다.","편집 툴(InDesign 등)을 활용하여 기본적인 편집 작업을 수행할 수 있다.","편집 완료된 결과물을 편집 지침과 대조하여 누락·오류 여부를 검토할 수 있다.","편집 과정에서 발생하는 문제를 상위자에게 정확하게 보고하고 해결 방향을 확인할 수 있다."],"knowledge":["편집 지침 및 면별 구성 요소","책의 판형·제본·사양별 특징","텍스트·이미지 배치 원칙","출판물 편집 기본 용어 및 개념"],"skill":["기술","편집 지침 적용 및 확인 능력","사양별 특징과 기획의도 연결 능력","편집 툴(InDesign 등) 기초 활용 능력"],"attitude":["편집 기준을 정확하게 이해하고 따르려는 자세","사양과 기획의도의 연관성을 능동적으로 파악하려는 노력","세부 편집 요소를 빠짐없이 확인하려는 꼼꼼한 자세"],"certs":[],"level":"담당","level_raw":"담당","level_buckets":["담당"],"level_display":"담당"},{"name":"제품·시장 기초 이해","definition":"영유아 그림책 이론서·해설서를 통독하고 유명 작가의 작품 특징을 이해하며, 기준 영유아제 품을 주제별·영역별로 조사·분석하고 판매자의 연령별 상담법과 고객 특성을 파악하는 역량","behaviors":["영유아 그림책에 대한 이론서·해설서 등을 5권 이상 통독하고 출간된 국내외 유명작가의 작품 특징 을 설명할 수 있다.","기준 영유아제품을 주제별·영역별로 조사·수집하고 그 특징(장단점)을 분석할 수 있다.","판매자의 제품별·연령별 상담과정(상담법)을 이해할 수 있다.","그림책의 그림 제작과정, 글과 그림의 조율방법, 그림의 기법적 특징 등을 알고 있다.","영유아 발달 단계별 콘텐츠 특성과 연령별 적합한 제품 유형을 설명할 수 북 디자인력","definition":"책 전체의 흐름을 파악 , 그림스타일 매칭, 글과 그림에 대한 파악을 바탕으로 새로운 디자인기 획을 도출해 내는 능력","behaviors":["책 전체의 스토리 흐름과 콘셉트를 파악하여 표지·내지의 시각 구성 방향을 기획할 수 있다.","그림작가의 그림스타일을 분석하고 이를 극대화할 수 있는 디자인 방향을 설정할 수 있다.","글과 그림의 조화를 고려하여 텍스트 배치·타이포그래피·여백 등을 구성할 수 있다.","그림디렉션을 수행하여 그림작가에게 필요한 수정 방향을 명확하게 전달할 수 있다.","완성된 그림을 디자인 의도에 맞게 정리하고 전체적인 시각 완성도를 높일 수 있다.","표지 디자인이 타깃 독자와 시장 트렌드에 맞게 구성되었는지 검토하고 수정할 수 있다.","내지 전체의 시각 일관성을 유지하며 권별 특성이 디자인에 반영되었는지 확인할 수 있다."],"knowledge":["영유아 그림책 표지·내지 시각 구성 원리","그림스타일 분석 및 디렉션 방법","타이포그래피·색상·여백 등 편집 디자인 원리","글과 그림의 조화 원칙 및 조율 방법","타깃 연령별 시각 표현 특성"],"skill":["표지·내지 시각 구성 기획 능력","그림디렉션 수행 및 전달 능력","타이포그래피·색상·여백 구성 능력","그림 정리 및 시각 완성도 제고 능력","시각 일관성 유지 및 검토 능력"],"attitude":["그림책의 스토리와 그림을 깊이 이해하고 시각적으로 표현하려는 창의적 자세","그림작가의 스타일을 존중하면서도 디자인 방향을 명확하게 유지하려는 균형 잡힌 자세","표지부터 내지까지 일관된 시각 완성도를 추구하려는 꼼꼼한 자세"],"certs":[],"level":"선임","level_raw":"선임","level_buckets":["선임"],"level_display":"선임"},{"name":"북 디자인 진행","definition":"북디자인 업무에 대한 이해를 바탕으로 편집자, 그림작가와 소통하여 그들의 능력을 끌어내어 새로운 디자인기획에 맞는 글과 그림 운용 및 디자인을 진행하는 역량","behaviors":["북디자인 전체 프로세스(기획·시안·본문 디자인·제작)의 흐름을 이해하고 각 단계를 실행할 수 있다.","편집자와 디자인 방향 및 편집 의도를 정확하게 공유하고, 의견 차이 발생 시 조율하여 합의점을 도 출할 수 있다.","그림작가의 스타일과 강점을 파악하고, 디자인 기획에 맞게 그림 방향과 수정 사항을 명확하게 전달 할 수 있다.","글과 그림의 운용 방향을 설정하고, 텍스트·이미지 배치 및 시각적 완성도를 높이는 방향으로 디자인 을 진행할 수 있다.","디자인 진행 일정을 관리하고, 편집자·그림작가·외주디자이너 등 관련자들의 납기를 점검하여 전체 일정을 조율할 수 있다.","진행 중 발생하는 디자인 이슈를 파악하고, 상위자에게 보고하며 해결 방향을 제안할 수 있다.","완성된 디자인 결과물이 최초 기획 의도에 부합하는지 검토하고, 최종 완성도를 확인할 수 있다."],"knowledge":["북디자인 프로세스 전반 및 단계별 역할 이해","편집자·그림작가 커뮤니케이션 방법","글과 그림 운용 원칙 및 시각적 조율 방법","디자인 진행 일정 관리 방법","출판 디자인 품질 기준 및 검수 방법"],"skill":["편집자·그림작가 소통 및 방향 전달 능력","글과 그림 운용 및 배치 조율 능력","디자인 진행 일정 관리 및 조율 능력","디자인 이슈 파악 및 보고 능력","결과물 검토 및 완성도 확인 능력"],"attitude":["편집자와 그림작가의 창의성을 존중하면서도 디자인 기획 방향을 명확하게 유지하려는 균형 잡힌 자세","북디자인 전반을 꼼꼼하게 파악하고 완성도를 높이려는 책임감","소통과 협업을 통해 최선의 결과물을 만들어내려는 적극적인 자세"],"certs":["시각디자인기사 (한국산업인력공단) GTQ(그래픽기술자격) 1급 (한국생산성본부)"],"level":"선임","level_raw":"선임","level_buckets":["선임"],"level_display":"선임"},{"name":"디자인 프로그램 사용","definition":"디자인 성과물 산출에 필요한 Illustrator·Photoshop·InDesign 등 각종 소프트웨어 및 AI 디자 인 툴을 업무에 효율적으로 활용하는 역량","behaviors":["Illustrator·Photoshop·InDesign 등 주요 디자인 툴의 기본 기능을 이해하고 활용할 수 있다.","각 프로그램의 특성과 용도를 파악하고 작업 목적에 맞는 툴을 선택하여 사용할 수 있다.","디자인 작업에 필요한 파일 형식(AI·PSD·INDD·PDF 등)의 특성을 이해하고 적절하게 변환·저장할 수 있다.","프로그램 활용 중 발생하는 기술적 문제를 스스로 해결하거나 도움을 요청하여 작업을 완수할 수 있 다.","새로운 디자인 툴이나 기능을 학습하고 업무에 적용할 수 있다.","작업 파일을 체계적으로 관리하고 버전별로 정리하여 팀 내에서 공유할 수 있다."],"knowledge":["주요 디자인 소프트웨어(Illustrator·Photoshop·InDesign) 기능 및 활용 방법","디자인 파일 형식별 특성 및 용도","출판 디자인 작업에 필요한 기본 설정 및 규격","파일 관리 및 버전 관리 방법"],"skill":["디자인 툴 기본 기능 활용 능력","작업 목적에 맞는 툴 선택 능력","파일 형식 변환 및 저장 관리 능력","새로운 툴 학습 및 적용 능력","작업 파일 체계적 관리 능력"],"attitude":["디자인 툴을 능숙하게 다루기 위해 지속적으로 학습하려는 자세","새로운 기능과 툴에 대한 호기심과 탐구적 자세","작업 파일을 꼼꼼하게 관리하고 정리하려는 습관"],"certs":["시각디자인산업기사 (한국산업인력공단)"],"level":"담당","level_raw":"담당","level_buckets":["담당"],"level_display":"담당"},{"name":"디자인 아이디에이션 및 시안 개발","definition":"프로젝트의 다양한 시각디자인 아이디어를 도출하고, 콘셉트에 맞는 디자인 시안을 제안·제작 하고 좋은 그림과 북디자인을 탐구하고 업무에 접목할 수 있는 역량","behaviors":["프로젝트의 콘셉트와 타깃 독자를 이해하고 다양한 시각디자인 아이디어를 도출할 수 있다.","도출된 아이디어를 스케치·무드보드 등으로 시각화하여 방향성을 구체화할 수 있다.","콘셉트에 맞는 디자인 시안을 제작하고 복수의 시안을 비교·제안할 수 있다.","제안한 시안에 대한 피드백을 수용하고 수정 방향을 반영하여 시안을 발전시킬 수 있다.","영유아 그림책의 특성(그림·색상·타이포그래피 등)을 고려하여 타깃 연령에 맞는 시안을 제작할 수 있다.","시안 제작 과정에서 참고 자료를 수집·활용하고 독창적인 아이디어로 발전시킬 수 있다.","완성된 시안을 팀 내에 발표하고 디자인 의도를 명확하게 설명할 수 있다."],"knowledge":["시각디자인 아이디에이션 방법론","무드보드·스케치 등 아이디어 시각화 방법","영유아 그림책 디자인 특성 및 타깃 연령별 시각 표현 기준","색상·타이포그래피·레이아웃 등 디자인 기본 원리","디자인 시안 제작 프로세스"],"skill":["시각디자인 아이디어 도출 능력","무드보드·스케치 시각화 능력","디자인 시안 제작 능력","피드백 수용 및 시안 발전 능력","시안 발표 및 디자인 의도 설명 능력"],"attitude":["다양한 시각적 표현 방법을 탐색하고 시도하려는 창의적 자세","피드백을 긍정적으로 수용하고 시안을 발전시키려는 열린 자세","타깃 독자의 시각적 선호도를 이해하고 반영하려는 노력"],"certs":["시각디자인산업기사 (한국산업인력공단)"],"level":"담당","level_raw":"담당","level_buckets":["담당"],"level_display":"담당"},{"name":"편집 디자인 기초","definition":"타이포그래피·색상·텍스트·이미지 배치 등 편집 디자인의 기본 원리를 이해하고, 그림책의 글과 그림이 조화롭게 표현될 수 있도록 기초 편집 디자인을 수행하는 역량","behaviors":["타이포그래피의 기본 원리(서체·자간·행간·크기 등)를 이해하고 그림책에 적합하게 적용할 수 있다.","색상의 기본 원리(색상환·명도·채도·배색 등)를 이해하고 타깃 연령에 맞는 색상을 선택할 수 있다.","텍스트와 이미지를 조화롭게 배치하여 가독성과 시각적 완성도를 높일 수 있다.","편집 디자인 기준(여백·그리드·정렬 등)을 이해하고 일관성 있게 적용할 수 있다.","그림책의 글과 그림이 서로 보완되고 조화롭게 표현되도록 기초적인 편집 디자인을 수행할 수 있다.","완성된 편집 결과물을 디자인 기준과 대조하여 오류·누락 여부를 확인할 수 있다.","상위자의 피드백을 수용하고 편집 디자인 완성도를 높이기 위해 수정할 수 있다."],"knowledge":["타이포그래피 기본 원리 및 적용 방법","색상 이론 및 배색 방법","텍스트·이미지 배치 원칙 및 그리드 시스템","영유아 그림책 편집 디자인 기준 및 특성","편집 디자인 오류 유형 및 검수 방법"],"skill":["타이포그래피 적용 능력","색상 선택 및 배색 능력","텍스트·이미지 배치 및 레이아웃 구성 능력","편집 기준 적용 및 일관성 유지 능력","결과물 검수 및 오류 수정 능력"],"attitude":["편집 디자인의 기본기를 탄탄하게 쌓으려는 학습 자세","글과 그림의 조화를 세심하게 살피려는 꼼꼼한 자세","피드백을 적극적으로 수용하고 빠르게 성장하려는 노력"],"certs":["GTQ(그래픽기술자격) 1급·2급 (한국생산성본부)","컴퓨터그래픽스운용기능사 (한국산업인력공 단)","컬러리스트산업기사 (한국산업인력공단) 3. 브랜드디자인"],"level":"담당","level_raw":"담당","level_buckets":["담당"],"level_display":"담당"}]},{"org":"디자인실","job":"브랜드디자인","slogan":"그림책의 가치를 시각적으로 극대화한다","role":"브랜드 아이덴티티를 디자인하며 관리하고, 마케팅·온라인·오프라인 전반에서 브랜드 일관성을 유 지한다.","competencies":[{"name":"디자인 컨셉 도출","definition":"디자인 기획·시안·프로젝트 진행을 거쳐 시각화된 최종 디자인 컨셉을 도출하고, 브랜드 아이 덴티티와의 일관성을 유지하며 그림책의 가치를 극대화하는 역량","behaviors":["프로젝트 기획 의도와 타깃 독자를 분석하여 시각적 방향성과 디자인 컨셉을 도출할 수 있다.","디자인 기획·시안·프로젝트 진행 과정을 종합하여 최종 디자인 컨셉을 확정할 수 있다.","도출된 컨셉이 브랜드 아이덴티티와 일관성을 유지하는지 검토하고 조정할 수 있다.","그림책의 스토리·그림·텍스트가 시각적으로 조화롭게 구현될 수 있도록 컨셉 방향을 제시할 수 있 다.","확정된 디자인 컨셉을 팀원 및 유관부서에 명확하게 전달하고 공감대를 형성할 수 있다.","컨셉 실행 과정에서 발생하는 이슈를 파악하고 컨셉의 완성도를 유지하며 조정할 수 있다.","완성된 결과물이 최초 컨셉 의도에 부합하는지 최종 검수하고 평가할 수 있다."],"knowledge":["디자인 컨셉 도출 방법론","브랜드 아이덴티티 구성 요소 및 관리 방법","영유아 그림책 시각 표현 특성 및 트렌드","스토리텔링과 시각 디자인의 연계 방법","디자인 프로세스 전반 및 단계별 컨셉 관리 방법"],"skill":["디자인 컨셉 도출 및 시각화 능력","브랜드 아이덴티티 일관성 유지 능력","컨셉 발표 및 공감대 형성 능력","결과물 최종 검수 및 평가 능력"],"attitude":["그림책의 가치를 시각적으로 극대화하려는 창의적 자세","브랜드 일관성을 끝까지 유지하려는 책임감","팀원과 유관부서의 의견을 수렴하면서도 컨셉 방향을 명확하게 유지하려는 리더십"],"certs":["시각디자인기사 (한국산업인력공단)","BX디자인전문가","컬러리스트기사 (한국산업인력공단)"],"level":"수석(리더급)","level_raw":"수석(리더급)","level_buckets":["수석"],"level_display":"수석"},{"name":"디자인 프로젝트 기획","definition":"디자인 프로젝트의 목적·내용·일정·요구사항을 파악하여 전체 디자인 프로세스를 구성하고 총 괄하는 역량","behaviors":["프로젝트의 목적과 요구사항을 파악하고 전체 디자인 프로세스를 설계할 수 있다.","프로젝트별 디자인 일정을 수립하고 단계별 마일스톤을 설정하여 관리할 수 있다.","프로젝트 수행에 필요한 인력과 자원을 파악하고 효율적으로 배분할 수 있다.","프로젝트 진행 상황을 주기적으로 점검하고 이슈 발생 시 신속하게 대응할 수 있다.","유관부서(편집·마케팅 등)와 프로젝트 요구사항을 협의하고 디자인 방향을 조율할 수 있다.","다수의 프로젝트를 동시에 관리하며 우선순위를 설정하고 일정을 조정할 수 있다.","프로젝트 완료 후 결과를 분석하고 차기 프로젝트에 반영할 개선 사항을 도출할 수 있다."],"knowledge":["디자인 프로젝트 기획 및 관리 방법론","출판 디자인 프로세스 전반 이해","인력·자원 배분 및 일정 관리 방법","유관부서 협업 프로세스 및 커뮤니케이션 방법","프로젝트 리스크 관리 방법"],"skill":["프로젝트 기획 및 프로세스 설계 능력","일정 수립 및 마일스톤 관리 능력","인력·자원 배분 능력","다수 프로젝트 동시 관리 능력","프로젝트 결과 분석 및 개선 도출 능력"],"attitude":["프로젝트 전체를 조망하며 선제적으로 리스크를 관리하려는 자세","팀원이 최상의 결과를 낼 수 있도록 지원하려는 리더십","기획부터 완성까지 일관된 품질을 유지하려는 책임감"],"certs":["PMP(프로젝트관리전문가)","시각디자인기사 (한국산업인력공단)"],"level":"수석(리더급)","level_raw":"수석(리더급)","level_buckets":["수석"],"level_display":"수석"},{"name":"디자인 조직 관리","definition":"크리에이티브 조직의 회사 내 역할과 부서·팀의 방향성을 제시하고, 팀원의 역량 개발과 성과를 관리하는 역량","behaviors":["회사 전략과 미션에 부합하는 디자인 부서의 역할과 방향성을 수립하고 팀원과 공유할 수 있다.","팀원별 강점과 성장 가능성을 파악하고 역량 개발 방향을 제시할 수 있다.","팀원의 업무를 적절하게 배분하고 성과를 주기적으로 점검하여 피드백할 수 있다.","디자인 부서의 연간 목표를 수립하고 목표 달성을 위한 실행 계획을 구체화할 수 있다.","크리에이티브 조직의 특성을 이해하고 팀원의 창의성과 자율성을 극대화하는 환경을 조성할 수 있 다.","타부서와의 협업 과정에서 디자인 부서의 입장을 대표하고 원활한 소통을 이끌 수 있다.","디자인 트렌드와 기술 변화를 파악하고 팀 역량 강화를 위한 교육·학습 기회를 마련할 수 있다."],"knowledge":["크리에이티브 조직 관리 방법론","팀원 역량 개발 및 성과 관리 방법","디자인 부서 목표 수립 및 실행 계획 방법","조직 내 디자인 부서의 역할 및 협업 구조","디자인 트렌드 및 기술 변화 파악 방법"],"skill":["부서 방향성 수립 및 공유 능력","팀원 역량 개발 및 피드백 능력","업무 배분 및 성과 관리 능력","타부서 협업 대표 및 소통 능력","팀 교육·학습 환경 조성 능력"],"attitude":["팀원의 성장과 창의성을 지원하려는 리더십","회사 전략과 디자인 부서의 방향을 일치시키려는 전략적 사고","크리에이티브 조직의 특성을 존중하고 자율과 책임의 균형을 유지하려는 자세"],"certs":[],"level":"수석(리더급)","level_raw":"수석(리더급)","level_buckets":["수석"],"level_display":"수석"},{"name":"디자인 기획","definition":"아이디에이션을 바탕으로 프로젝트에 맞는 새로운 디자인 기획을 제안하고 적용할 수 있는 역량","behaviors":["프로젝트의 목적과 타깃 독자를 분석하여 디자인 기획 방향을 설정할 수 있다.","아이디에이션 결과를 바탕으로 프로젝트에 적합한 디자인 기획안을 작성하고 제안할 수 있다.","기획안이 영유아 그림책의 특성과 브랜드 아이덴티티에 부합하는지 검토할 수 있다.","디자인 기획 방향을 편집팀·마케팅팀 등 유관부서에 명확하게 전달하고 협의할 수 있다.","기획안을 실제 디자인 작업에 적용하고 결과물이 기획 의도에 맞게 구현되는지 확인할 수 있다.","다수의 프로젝트 기획을 동시에 진행하며 각각의 완성도를 유지할 수 있다.","기획 결과물을 분석하고 차기 프로젝트 기획에 반영할 개선 사항을 도출할 수 있다."],"knowledge":["디자인 기획 프로세스 및 기획안 작성 방법","영유아 그림책 시각 표현 특성 및 장르별 디자인 기준","브랜드 아이덴티티 적용 방법","타깃 독자별 디자인 방향 설정 기준","유관부서 협업 프로세스 및 커뮤니케이션 방법"],"skill":["디자인 기획안 작성 및 제안 능력","브랜드 아이덴티티 적용 및 검토 능력","유관부서 협의 및 조율 능력","기획 결과 분석 및 개선 도출 능력"],"attitude":["프로젝트의 목적과 타깃을 깊이 이해하고 기획에 반영하려는 자세","창의적인 아이디어를 구체적인 기획으로 발전시키려는 노력","기획 의도가 결과물에 온전히 구현될 때까지 끝까지 확인하려는 책임감"],"certs":["BX디자인전문가"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"디자인 방향 수립","definition":"시장 조사 결과를 바탕으로 영유아 출판 브랜드디자인 기획 방향을 수립하는 역량","behaviors":["시장 조사 결과를 분석하여 경쟁 제품 대비 시각적 차별화 포인트를 도출할 수 있다.","유아동 출판 디자인 트렌드를 파악하고 자사 제품에 적용 가능한 방향을 설정할 수 있다.","타깃 독자(연령·성향 등)를 고려하여 제품별 디자인 방향을 구체화할 수 있다.","수립된 디자인 방향을 팀원 및 유관부서에 명확하게 제시하고 실행 기준으로 공유할 수 있다.","디자인 방향이 브랜드 아이덴티티와 일관성을 유지하는지 점검하고 조정할 수 있다.","제품 출시 후 디자인 방향에 대한 시장 반응을 분석하고 차기 방향 수립에 반영할 수 있다.","신규 프로젝트 착수 시 디자인 방향 수립 기준과 프로세스를 팀 내에 정착시킬 수 있다."],"knowledge":["국내외 유아동 출판 디자인 트렌드 분석 방법","시각적 차별화 전략 수립 방법","타깃 독자별 디자인 방향 설정 기준","브랜드 아이덴티티와 디자인 방향 연계 방법","시장 반응 분석 및 피드백 반영 방법"],"skill":["시장 조사 결과 분석 및 차별화 포인트 도출 능력","디자인 방향 수립 및 문서화 능력","팀원·유관부서 공유 및 설득 능력","브랜드 일관성 점검 및 조정 능력","시장 반응 분석 및 방향 조정 능력"],"attitude":["시장과 고객 관점에서 차별화된 디자인 방향을 찾으려는 탐구적 자세","트렌드에 민감하게 반응하면서도 브랜드 정체성을 지키려는 균형 잡힌 자세","수립된 방향을 팀 전체가 실행할 수 있도록 명확하게 공유하려는 리더십"],"certs":["시각디자인기사 (한국산업인력공단)","컬러리스트기사 (한국산업인력공단)","BX디자인전문가"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"디자인 제작 관리","definition":"완성된 디자인 샘플을 확인(교정지·각종 샘플·컬러 감리)하고 최종 완성된 제작물을 검토·관리 하는 역량","behaviors":["디자인 교정지를 검토하여 오류·누락 여부를 확인하고 수정 사항을 명확하게 전달할 수 있다.","각종 샘플(표지·내지·컬러 등)을 기획 의도와 대조하여 품질 기준에 맞는지 확인할 수 있다.","컬러 감리를 수행하여 인쇄 결과물의 색상이 디자인 의도와 일치하는지 검증할 수 있다.","제작 단계별 완성도를 점검하고 이슈 발생 시 제작팀과 신속하게 협의하여 해결할 수 있다.","최종 완성된 제작물을 기획 의도·품질 기준에 따라 종합적으로 검토하고 승인할 수 있다.","제작 과정에서 발생한 이슈와 해결 방법을 기록하고 차기 제작에 참고할 수 있도록 관리할 수 있다.","외주디자이너 결과물을 검토하고 품질 기준에 맞게 피드백하여 완성도를 높일 수 있다."],"knowledge":["인쇄·제본·코팅 등 출판 제작 공정 및 원리","컬러 감리 기준 및 방법","디자인 교정 기호 및 교정 프로세스","출판 디자인 품질 기준 및 검수 방법","외주디자이너 관리 및 피드백 방법"],"skill":["교정지 검토 및 수정 사항 전달 능력","샘플 품질 확인 및 컬러 감리 능력","제작 단계별 완성도 점검 능력","외주디자이너 결과물 검토 및 피드백 능력","제작 이슈 기록 및 관리 능력"],"attitude":["제품 품질에 대한 높은 기준을 끝까지 유지하려는 자세","제작 과정 전반을 꼼꼼하게 확인하고 문제를 사전에 예방하려는 노력","제작팀·외주디자이너와 명확하게 소통하며 협력적으로 문제를 해결하려는 자세"],"certs":["컬러리스트기사 (한국산업인력공단)","시각디자인기사 (한국산업인력공단)"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"디자인 커뮤니케이션","definition":"전문성과 유연성을 바탕으로 편집팀 등 타부서와 협력 관계를 유지하고, 디자인 전략과 논리로 유관부서를 설득하며 프로젝트를 원활하게 진행하는 역량, 조직 내 상급자의 실무 노하우 전수 를 통해 하급자의 직무 적응력을 높이는 중간역할","behaviors":["개발실,마케팅팀,영업 등 유관부서와 디자인 방향을 협의하고 공통 목표를 설정할 수 있다.","디자인 전략과 논리를 바탕으로 유관부서의 요구사항과 디자인 방향 간의 이견을 조율할 수 있다.","디자인 결정 사항을 비전문가도 이해할 수 있도록 명확하게 설명하고 설득할 수 있다.","프로젝트 진행 과정에서 발생하는 부서 간 갈등을 파악하고 원만하게 해결할 수 있다.","외주디자이너·그림작가 등 외부 협력자와 디자인 의도를 명확하게 공유하고 결과물을 이끌어낼 수 있다.","프로젝트 주요 의사결정 사항을 관련 부서에 적시에 공유하고 피드백을 반영할 수 있다.","협업 과정에서 디자인 부서의 전문성과 역할을 명확하게 제시하고 신뢰를 구축할 수 있다."],"knowledge":["디자인 커뮤니케이션 전략 및 설득 방법","유관부서 협업 프로세스 및 역할 분담 기준","디자인 전문 용어의 비전문가 대상 설명 방법","갈등 관리 및 이견 조율 방법론","외부 협력자 관리 및 커뮤니케이션 방법"],"skill":["디자인 방향 설명 및 설득 능력","유관부서 이견 조율 및 협의 능력","외부 협력자 커뮤니케이션 능력","프로젝트 의사결정 공유 및 피드백 반영 능력","부서 간 신뢰 구축 능력"],"attitude":["디자인 전문성을 바탕으로 유연하게 소통하려는 자세","타부서의 입장을 이해하면서도 디자인 방향을 명확하게 유지하려는 균형 잡힌 자세","협업 과정에서 신뢰를 쌓고 장기적인 협력 관계를 구축하려는 노력"],"certs":[],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"디자인 시장조사","definition":"프로젝트 관련 국내외 디자인 트렌드와 다양한 자료를 수집·분류·분석하여 효과적인 브랜드디 자인 개발을 위한 기초를 마련하는 역량","behaviors":["국내외 영유아 그림책 디자인 트렌드를 주기적으로 조사하고 주요 변화를 파악할 수 있다.","프로젝트 관련 경쟁 제품의 디자인 특성과 장단점을 분석하고 차별화 포인트를 도출할 수 있다.","다양한 채널(서점·온라인·해외 출판 박람회 등)을 통해 디자인 참고 자료를 수집·분류할 수 있다.","수집된 자료를 체계적으로 정리하고 "},{"name":"시안 디자인 개발 기초","definition":"각종 디자인 작업 도구 및 컴퓨터 프로그램을 사용하여 프로젝트의 콘셉트에 맞는 여러 가지 디 자인 시안을 제안하고 제작하는 역량","behaviors":["프로젝트 콘셉트와 디자인 방향을 이해하고 이를 반영한 디자인 시안 방향을 설정할 수 있다.","Photoshop·Illustrator 등 디자인 툴을 활용하여 콘셉트에 맞는 복수의 디자인 시안을 제작할 수 있 다.","제작된 시안을 비교하고 각 시안의 장단점을 분석하여 제안할 수 있다.","브랜드 아이덴티티와 스타일 가이드를 준수하며 시안을 제작할 수 있다.","시안에 대한 피드백을 수용하고 수정 방향에 맞게 시안을 발전시킬 수 있다.","중국사업 디자인 납기 기준을 준수하여 정해진 일정 내에 시안을 완성하고 전달할 수 있다.","완성된 시안을 팀 내에 발표하고 디자인 의도를 명확하게 설명할 수 있다."],"knowledge":["디자인 시안 개발 프로세스 및 방법","디자인 툴(Photoshop·Illustrator 등) 기능 및 활용 방법","브랜드 아이덴티티 및 스타일 가이드 적용 방법","시안 비교 분석 및 제안 방법","납기 기준 및 일정 관리 방법"],"skill":["디자인 방향 파악 및 시안 방향 설정 능력","디자인 툴 활용 및 시안 제작 능력","복수 시안 비교 분석 및 제안 능력","브랜드 아이덴티티 준수 능력","피드백 수용 및 시안 수정·발전 능력"],"attitude":["프로젝트 콘셉트를 정확하게 이해하고 시안에 충실히 반영하려는 자세","피드백을 긍정적으로 수용하고 빠르게 수정하려는 열린 자세","납기를 철저하게 준수하려는 책임감"],"certs":["GTQ(그래픽기술자격) 1급 (한국생산성본부)","시각디자인산업기사 (한국산업인력공단)","컴퓨터 그래픽스운용기능사 (한국산업인력공단)"],"level":"담당~선임","level_raw":"담당~선임","level_buckets":["담당","선임"],"level_display":"담당~선임"},{"name":"디자인 리서치 조사","definition":"프로젝트를 성공적으로 수행하기 위해 관련 분야의 다양한 자료를 수집·분류·분석하여 효과적 인 디자인 개발을 위한 기초를 마련하는 역량","behaviors":["프로젝트 목적과 디자인 방향에 맞는 리서치 범위와 방법을 설정할 수 있다.","국내외 디자인 트렌드·경쟁사·유사 사례 등 다양한 채널을 통해 관련 자료를 수집할 수 있다.","수집된 자료를 유형별로 분류하고 프로젝트에 활용 가능한 인사이트를 도출할 수 있다.","리서치 결과를 체계적으로 정리하고 팀 내에 공유하여 디자인 기획에 활용할 수 있도록 할 수 있다.","타깃 고객의 시각적 선호도와 소비 트렌드를 조사하고 디자인 방향에 반영할 수 있다.","리서치 결과를 바탕으로 디자인 방향 설정에 필요한 근거 자료를 제시할 수 있다.","리서치 자료를 체계적으로 관리하고 차기 프로젝트에 참고할 수 있도록 정리할 수 있다."],"knowledge":["디자인 리서치 방법론 및 자료 수집 방법","국내외 디자인 트렌드 분석 방법","경쟁사·유사 사례 분석 방법","타깃 고객 시각적 선호도 조사 방법","리서치 자료 분류·정리·관리 방법"],"skill":["리서치 범위·방법 설정 능력","다양한 채널을 통한 자료 수집 능력","자료 분류 및 인사이트 도출 능력","리서치 결과 정리 및 팀 내 공유 능력","리서치 근거 자료 제시 능력"],"attitude":["다양한 채널을 통해 폭넓게 자료를 수집하려는 능동적 자세","수집된 자료를 단순 정리에 그치지 않고 디자인에 연결하려는 분석적 자세","리서치 자료를 체계적으로 관리하고 팀의 지식 자산으로 축적하려는 노력"],"certs":["시각디자인산업기사 (한국산업인력공단)","GTQ(그래픽기술자격) 1급 (한국생산성본부)","컬러리 스트산업기사 (한국산업인력공단)"],"level":"담당~선임","level_raw":"담당~선임","level_buckets":["담당","선임"],"level_display":"담당~선임"},{"name":"최종 디자인 실행","definition":"선정된 시안에 필요한 일러스트레이션·사진촬영·카피라이팅·타이포그래피·레이아웃·색상 등을 완성하고 그에 따른 어플리케이션 디자인까지 개발하는 역량","behaviors":["선정된 시안의 디자인 방향을 정확하게 이해하고 최종 디자인 실행 계획을 수립할 수 있다.","일러스트레이션·타이포그래피·색상·레이아웃 등 디자인 요소를 시안에 맞게 완성할 수 있다.","필요한 사진 촬영 방향을 파악하고 촬영 결과물을 디자인에 적합하게 활용할 수 있다.","카피라이팅 방향을 파악하고 디자인에 적합한 텍스트 요소를 배치하여 완성도를 높일 수 있다.","완성된 디자인을 각종 어플리케이션(SNS·인쇄물·굿즈·디지털 플랫폼 등)에 맞게 적용할 수 있다.","최종 디자인 결과물을 납품 기준에 맞게 출력·저장하고 유관부서에 전달할 수 있다.","상위자의 피드백을 수용하고 수정 방향에 맞게 최종 결과물을 보완할 수 있다."],"knowledge":["일러스트레이션·타이포그래피·색상·레이아웃 디자인 원리","사진 촬영 방향 파악 및 활용 방법","카피라이팅 방향 파악 및 텍스트 배치 방법","어플리케이션별 디자인 적용 기준 및 방법","납품 기준 출력·저장 방법"],"skill":["디자인 요소 완성 및 시안 구현 능력","사진 촬영 결과물 활용 능력","카피라이팅 텍스트 배치 능력","어플리케이션별 디자인 적용 능력","납품 기준 출력·저장 및 전달 능력"],"attitude":["선정된 시안의 디자인 방향을 정확하게 구현하려는 꼼꼼한 자세","다양한 어플리케이션에 일관성 있게 디자인을 적용하려는 책임감","피드백을 적극적으로 수용하고 빠르게 개선하려는 열린 자세"],"certs":["시각디자인기사 (한국산업인력공단)","GTQ(그래픽기술자격) 1급 (한국생산성본부)","컬러리스트 기사 (한국산업인력공단)"],"level":"담당~선임","level_raw":"담당~선임","level_buckets":["담당","선임"],"level_display":"담당~선임"},{"name":"디자인 자료화","definition":"완성된 디자인 결과물을 정리하여 관리하고 결과물에 대한 권리를 보호하기 위하여 지식재산권 을 확보하는 역량","behaviors":["완성된 디자인 결과물을 프로젝트별·유형별로 분류하고 체계적으로 정리하여 저장할 수 있다.","디자인 결과물의 버전을 관리하고 최종 확정본과 수정 이력을 명확하게 구분하여 관리할 수 있다.","디자인 결과물에 대한 지식재산권 확보 여부를 확인하고 필요한 등록 절차를 진행할 수 있다.","저작권·상표권 등 지식재산권 관련 기준을 이해하고 결과물 관리에 적용할 수 있다.","정리된 디자인 자료를 팀 내에서 쉽게 찾고 활용할 수 있도록 공유 체계를 구성할 수 있다.","외부 유출 방지를 위해 디자인 결과물의 접근 권한을 관리하고 보안 기준을 준수할 수 있다.","디자인 자료화 현황을 주기적으로 점검하고 누락·오류 여부를 확인하여 보완할 수 있다."],"knowledge":["디자인 결과물 분류·정리 방법 및 저장 기준","디자인 버전 관리 방법","지식재산권(저작권·상표권 등) 개념 및 등록 절차","디자인 자료 공유 체계 구성 방법","디자인 결과물 보안 관리 방법"],"skill":["디자인 결과물 분류·정리 및 저장 능력","버전 관리 및 수정 이력 관리 능력","지식재산권 확보 절차 진행 능력","디자인 자료 공유 체계 구성 능력","접근 권한 관리 및 보안 기준 준수 능력"],"attitude":["디자인 결과물을 체계적으로 관리하고 언제든지 활용 가능한 상태로 유지하려는 꼼꼼한 자세","지식재산권 보호의 중요성을 인식하고 철저하게 관리하려는 책임감","팀 전체가 디자인 자료를 효율적으로 활용할 수 있도록 공유 체계를 개선하려는 노력"],"certs":["시각디자인산업기사 (한국산업인력공단)","컴퓨터활용능력 1급 (대한상공회의소)","저작권능력검 정시험 (한국저작권위원회) 14. IT개발운영"],"level":"담당~선임","level_raw":"담당~선임","level_buckets":["담당","선임"],"level_display":"담당~선임"}]},{"org":"IT개발운영팀","job":"IT개발운영","slogan":"매출을 만드는 시스템을 기획하고, 안정적으로 운영한다","role":"판매인 및 내부직원의 매출목표 달성을 위하여 업무목적별 효율적인 내부 시스템을 기획·개발·운영 하고, 안정적인 인프라를 구축·유지·개선하여 전사 업무 효율성을 높인다.","competencies":[{"name":"IT시스템 운영기획","definition":"전사 업무 효율화를 위하여 IT시스템 개선과제를 기획하고, 실행에 필요한 예산을 수립하며 시 스템 운영 전반을 총괄하는 역량","behaviors":["조직의 전략 및 목적과 IT시스템 업무가 연계될 수 있도록 IT서비스 수준 개선에 관한 운영목표와 추 진 전략을 수립할 수 있다.","조직의 운영목표 달성을 위한 IT시스템의 장단기 추진과제를 도출하고, IT자원의 투자 우선순위 기준 에 따라 일정·조직·예산을 포함하는 실행계획을 수립할 수 있다.","운영목표 기준 성과평가·서비스수준 모니터링·품질점검·고객 불만사항 관리를 통해 개선사항을 식별 하고 과제 추진계획을 수립할 수 있다.","IT시스템 운영에 필요한 연간 예산을 편성하고 집행 현황을 관리하며 비용 효율화 방안을 도출할 수 있다.","IT운영 현황과 성과를 정기적으로 경영진에게 보고하고 의사결정에 필요한 정보를 제공할 수 있다.","IT시스템 운영 관련 내·외부 이해관계자(유관부서·벤더·협력사)와의 협력 체계를 구축하고 조율할 수 있다.","IT운영 리스크를 사전에 식별하고 대응 방안을 수립하여 시스템 운영의 안정성을 확보할 수 있다."],"knowledge":["비즈니스 환경분석 기법 (SWOT·PESTLE 등)","Man Month 기법 (IT 인력 투입 산정)","SMART 목표 설정 기법","IT서비스 관리 방법론 (ITSM·ITIL 등)","IT 예산 수립 및 투자 우선순위 결정 방법론"],"skill":["목표 달성 방안 수립 능력","목표 미달 원인 분석 능력","일정계획 수립 능력","자원배분의 우선순위 식별 기술","IT 운영 성과 분석 및 보고서 작성 능력","이해관계자 커뮤니케이션 및 협의 능력"],"attitude":["현재 수준에 대한 개선 의지 및 근본 원인을 식별하려는 탐구심","현상을 정량적으로 분석하고 자료를 수집·정리하여 체계적으로 수행하려는 자세","전사 관점에서 IT시스템의 역할과 가치를 이해하고 비즈니스 기여도를 높이려는 자세","변화하는 기술 환경과 비즈니스 요구에 선제적으로 대응하려는 자세"],"certs":["정보관리기술사","PMP(프로젝트관리전문가)","ITIL Foundation","정보처리기사"],"level":"수석(리더급)","level_raw":"수석(리더급)","level_buckets":["수석"],"level_display":"수석"},{"name":"IT시스템 보안운영","definition":"IT서비스 자원(운영체제·데이터베이스·응용소프트웨어·네트워크 등)의 기밀성·무결성·가용성을 확보하고, 보안 정책을 수립·운영하여 안정적이고 안전한 서비스를 제공하는 역량","behaviors":["조직의 보안 규정에 포함된 애플리케이션 보안 요구사항을 파악하고 보안 정책을 수립할 수 있다.","보안 요구사항에 의거하여 네트워크 보안솔루션을 안정적으로 운영할 수 있다.","IT 환경변화에 따른 변화를 반영할 수 있도록 시스템 보안솔루션 운영 환경을 정기적으로 검토하고 보완할 수 있다.","서버·운영체제·애플리케이션의 취약점을 주기적으로 분석하고 보안 패치 및 조치 계획을 수립·실행 할 수 있다.","보안 사고·침해 시도 발생 시 원인을 분석하고 신속하게 대응하여 피해를 최소화하며 재발 방지 대책 을 수립할 수 있다.","접근 통제 정책을 설계하고 사용자별 권한을 관리하여 내·외부 비인가 접근을 차단할 수 있다.","보안 감 evel_raw":"수석(리더급)","level_buckets":["수석"],"level_display":"수석"},{"name":"IT시스템 운영관리","definition":"IT시스템 전반의 상태를 모니터링하고 문제점을 분석하여 적절한 조치를 취하며, 장애 원인별 대응 방안을 수립하고 재발 방지 대책을 강구하여 시스템을 안정적으로 운영·관리하는 역량","behaviors":["수립된 IT시스템 운영 기획으로부터 요구된 적합한 관리목록 및 운영 기준을 도출할 수 있다.","시스템 개선 요청에 대한 이해를 위하여 개선 요구된 시스템의 환경과 필요 사항을 파악할 수 있다.","파악된 개선 요건에 대해서 하드웨어·소프트웨어·비즈니스 프로세스·시스템운영과 관련한 해결책을 강구할 수 있다.","개선 방안에 대한 상세 내용과 대응 계획을 수립하여 안정적 운영관리를 할 수 있다.","IT시스템 장애 발생 시 원인을 신속하게 분석하고 복구 절차에 따라 대응하며 영향 범위를 최소화할 수 있다.","장애 처리 후 재발 방지를 위한 근본 원인 분석(RCA)을 수행하고 개선 조치를 실행할 수 있다.","IT시스템 성능 지표(CPU·메모리·네트워크·응답시간 등)를 주기적으로 모니터링하고 성능 저하 요인 을 분석하여 개선할 수 있다.","시스템 운영 현황과 장애 이력을 문서화하고 정기적으로 운영 보고서를 작성하여 보고할 수 있다."],"knowledge":["문제 관리 절차","ITSM(IT Service Management) 개선 성과 측정 방법","사용자 인터페이스 정보","IT시스템 구성 요소 및 아키텍처 이해","장애 관리 및 근본 원인 분석(RCA) 방법론","IT시스템 성능 지표(KPI) 및 모니터링 도구"],"skill":["IT시스템 운용 능력","시스템 개선 분석 능력","IT시스템 성능 개선 방안 검증 능력","장애 원인 분석 및 복구 처리 능력","시스템 모니터링 도구 활용 능력","운영 현황 문서화 및 보고서 작성 능력"],"attitude":["요구사항을 논리적·객관적으로 이해하려는 자세","협업을 위한 적극적인 태도 및 유관 부서와 원활하게 의사소통하려는 자세","목적에 맞게 최적의 시스템을 공급하고자 하는 의지","장애 상황에서 침착하게 대응하고 신속하게 복구하려는 자세","시스템 안정성 향상을 위해 지속적으로 개선 방안을 모색하려는 자세"],"certs":["정보처리기사","ITIL Foundation","AWS Solutions Architect","네트워크관리사"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"IT프로젝트 통합구현","definition":"단위 모듈 간 분산된 데이터 관계를 분석하고, 전체 프로젝트의 통합 모듈 간 효율적 연계를 구 현하며 통합 완료 여부를 검증하는 역량","behaviors":["개발하고자 하는 시스템과 업무 모듈 간 특성을 고려하여 효율적 데이터 송수신을 정의할 수 있다.","외부 및 내부 모듈 간의 연계를 위한 데이터 표준을 기반으로 통합구현을 할 수 있다.","구성된 연계 메커니즘에 대한 명세서를 참조하여 연계모듈 구현을 위한 논리적·물리적 환경을 준비 할 수 있다.","연계모듈의 안정적 작동 여부와 모듈 간 인터페이스를 통해 연동된 데이터의 무결성을 검증할 수 있 다.","통합 테스트 계획을 수립하고 단위 모듈 간 연계 오류를 탐지하여 수정할 수 있다.","통합 구현 과정에서 발생하는 성능 저하 요인을 분석하고 최적화 방안을 도출할 수 있다.","통합 완료 후 운영 환경에서의 안정성을 검증하고 발생 가능한 장애 시나리오에 대한 대응 방안을 수 립할 수 있다.","통합구현 결과를 문서화하고 유지보수에 필요한 기술 문서를 작성할 수 있다."],"knowledge":["소프트웨어 개발방법론 (폭포수·애자일·DevOps 등)","소프트웨어 아키텍처 이해","산업 분야별 업무 특성","설계 모델링 기법","시스템 통합 패턴 및 인터페이스 설계 방법 (API·ESB·EAI 등)","통합 테스트 방법론 및 데이터 무결성 검증 기법"],"skill":["데이터 연계 및 이관 도구 활용 능력","애플리케이션 프레임워크 활용 능력","통합 테스트 계획 수립 및 실행 능력","모듈 간 인터페이스 오류 탐지 및 수정 능력","시스템 성능 분석 및 최적화 능력","통합구현 기술 문서 작성 능력"],"attitude":["성공적인 개발을 하고자 하는 의지","도출된 모듈·기능 컴포넌트를 분석하기 위한 노력","모듈 간 복잡한 연계 구조를 끝까지 파악하려는 집요함","통합 과정에서 발생하는 오류를 회피하지 않고 근본 원인을 찾으려는 자세","유관 부서 및 개발팀과 적극적으로 협력하여 통합 완성도를 높이려는 자세"],"certs":["정보처리기사","정보처리산업기사","AWS Solutions Architect","OCJP(Java 공인 개발자)"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"개인정보 기술적 보호조치 운영","definition":"개인정보보호 법령에서 요구하는 기술적·관리적 보호조치를 IT시스템에 구현·운영하고, 접근통 제·암호화·접속기록 관리 등을 통해 시스템 내 개인정보가 안전하게 처리될 수 있도록 지원하는 역량","behaviors":["개인정보 처리시스템에 접근통제(권한관리, 인증) 기능을 구현·운영할 수 있다.","개인정보의 암호화 저장·전송이 적용되도록 시스템을 설계·운영할 수 있다.","개인정보 접속기록을 생성·보관하고 정기적으로 점검할 수 있다.","개인정보 처리시스템의 보안 취약점을 점검하고 개선 조치를 수행할 수 있다.","불필요한 개인정보 보유 현황을 점검하고 파기 절차를 시스템에 반영할 수 있다.","보안사고 발생 시 시스템 차원의 원인 분석과 기술적 대응 조치를 수행할 수 있다.","개인정보보호 담당부서의 정책·지침이 시스템에 반영되도록 협조할 수 있다."],"knowledge":["개인정보보호법상 안전성 확보조치 기준 (기술적 보호조치 중심)","접근통제·인증·권한관리 기술","암호화 알고리즘 및 적용 방식 (저장/전송)","접속기록 관리 및 로그 분석","보안 취약점 진단 및 조치 방법"],"skill":["개인정보 처리시스템 보안 설정 및 운영 능력","암호화·접근통제 기능 구현 능력","접속기록 분석 및 이상징후 탐지 능력","보안 취약점 진단 및 개선 능력","개인정보보호 담당부서와의 협업 능력"],"attitude":["개인정보 보안의 중요성을 인식하고 책임감 있게 업무를 수행하려는 자세","법령 및 사내 보안정책을 준수하려는 자세","보안 이슈에 대해 신속·정확하게 대응하려는 자세","변화하는 보안 기술 환경에 맞춰 지속 학습하려는 자세"],"certs":["정보보안기사","정보처리기사","SQLP","SQLD"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"웹 서버관리","definition":"웹 서버의 설치·설정·배포를 수행하고 서비스 자원을 안정적으로 할당하며, 서버 상태를 모니터 링하고 장애 발생 시 신속하게 대응하여 서비스를 안정적으로 운영하는 역량","behaviors":["시스템 운용계획에 따라 리눅스·윈도우 등 서버용 운영체제를 설치하고 사용자 요구에 따라 접근통 제 등 보안기능을 구성·적용하여 관리할 수 있다.","관련 서비스 데몬 등 패키지 파일 및 기능을 설치하고 사용자 요구에 따라 최적의 환경을 구성하여 서비스를 제공할 수 있다.","서버 보안패치 및 업그레이드를 실시하고 필요 시 백업 복구절차 및 향후 확장을 고려한 자원관리 업 무를 수행할 수 있다.","웹 서버 성능 지표(CPU·메모리·디스크·네트워크 트래픽 등)를 주기적으로 모니터링하고 성능 저하 원인을 분석하여 최적화할 수 있다.","웹 서버 장애 발생 시 SOP에 따라 원인을 신속하게 파악하고 서비스 복구를 수행하며 재발 방지 대 책을 수립할 수 있다.","서버 용량 계획을 수립하고 서비스 트래픽 증가에 대비하여 자원을 사전에 확보하고 확장 방안을 준 비할 수 있다.","웹 서버 접근 로그를 분석하여 비정상적인 접근 시도를 탐지하고 보안 위협에 대응할 수 있다.","정기적으로 서버 데이터 백업을 수행하고 복구 테스트를 통해 백업 데이터의 유효성을 검증할 수 있 다.","서버 운영 현황과 장애 이력을 문서화하고 운영 보고서를 작성하여 보고할 수 있다."],"knowledge":["시스템 운영 환경 정보 (리눅스·윈도우 서버 운영체제)","IT시스템 서버 장애처리 SOP(Standard Operating Procedure)","하드웨어·네트워크·응용소프트웨어 간 상호 연관관계","웹 서버 소프트웨어 종류 및 설정 방법 (Apache·Nginx·IIS 등)","서버 보안 취약점 유형 및 패치 관리 방법","서버 용량 계획 및 자원 관리 방법론"],"skill":["서버 운영체제 활용 능력","하드웨어 스펙 분석 기술","시스템 복구 조치 능력","서버 성능 모니터링 도구 활용 능력","웹 서버 접근 로그 분석 및 보안 위협 탐지 능력","서버 백업 및 복구 절차 수행 능력"],"attitude":["시스템 장애 발생 시 적절한 조치와 보고 등 문제를 신속하게 해결하려는 의지","시스템 구성요소의 변경사항을 주기적으로 점검하는 자세","상이한 환경의 하드웨어별 특성을 이해하고자 하는 능동적 자세","서비스 중단을 최소화하기 위해 사전 예방적으로 운영 환경을 점검하려는 자세","새로운 서버 기술과 운영 환경 변화에 지속적으로 학습하고 적응하려는 자세"],"certs":["정보처리기사","리눅스마스터 1급","네트워크관리사","AWS Solutions Architect"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"요구사항 분석","definition":"사용자의 업무 목적별 요구사항을 도출·분석·명세화하고, 분석기법을 활용하여 요구사항을 재 검증하며 명확하게 정의·문서화하는 역량","behaviors":["인터뷰·시나리오 작성·프로토타입 제작·그룹회의·관찰·사용자 스토리 작성 등 제시된 기법을 통해 애 플리케이션의 요구사항을 도출할 수 있다.","도출한 요구사항을 기능적 요구사항과 비기능적 요구사항으로 분류할 수 있다.","도출한 요구사항이 개발하고자 하는 애플리케이션 전체 또는 단위 컴포넌트에 영향이 있는지를 분석 하여 요구사항의 적용 범위를 확인할 수 있다.","요구사항 분석 결과를 토대로 사용자와 요구사항·우선순위·영향 범위 등을 확정할 수 있다.","구현하고자 하는 애플리케이션이 구동되는 시스템이나 하드웨어 관련 내용을 구체화하여 시스템 요 구사항 문서를 작성할 수 있다.","요구사항 명세서를 작성하고 이해관계자(고객·개발팀·운영팀)가 공통으로 이해할 수 있도록 명확하 게 기술할 수 있다.","프로젝트 진행 중 변경되는 요구사항을 체계적으로 관리하고 변경 영향도를 분석하여 관련자에게 공 유할 수 있다."],"knowledge":["소프트웨어 요구사항 관리 절차","소프트웨어 요구사항 도출 기법 (인터뷰·설문·프로토타이핑·워크숍 등)","요구사항 우선순위 선정 기준 (MoSCoW·Kano 모델 등)","기능적·비기능적 요구사항의 개념 및 구분 기준","요구사항 명세서(SRS) 작성 방법 및 표준"],"skill":["요구사항 도출 및 검증 능력","그룹 회의·토의 진행 능력","요구사항 명세서(SRS) 작성 능력","요구사항 우선순위 분석 및 조정 능력","요구사항 변경 관리 및 영향도 분석 능력"],"attitude":["도출한 요구사항을 사용자 관점에서 체계적이고 정확하게 이해하고자 하는 노력","요구사항 명세서의 내용을 고객과 개발팀이 이해할 수 있도록 명확하게 기술하려는 노력","이해관계자의 다양한 의견을 경청하고 균형 있게 반영하려는 자세","요구사항의 모호함을 그냥 넘기지 않고 끝까지 명확하게 확인하려는 꼼꼼한 자세"],"certs":["정보처리기 는 역량","behaviors":["회사의 비전과 미션을 바탕으로 구체적이고 측정 가능한 예산을 설정할 수 있다.","매출·이익·비용 등 재무적 지표와 시장 동향·경쟁사 분석·인력 수요 등 비재무적 지표를 고려하여 예 산을 수립할 수 있다.","부서별 예산 요구사항을 수집하고 사업의 중요도와 긴급성을 고려하여 우선순위를 결정할 수 있다.","경영진과 협의·협상을 통해 사업부별 예산을 조정하여 최적의 종합예산을 확정할 수 있다.","예산 집행 현황을 주기적으로 모니터링하여 계획 대비 실적 차이를 파악할 수 있다.","예산을 초과하거나 미만으로 집행된 항목의 원인을 분석하고 계절적 요인·이벤트 등 집행 변동성을 파악할 수 있다.","예산 대비 실적 차이 분석 결과를 경영진에게 보고하고 개선 방안을 제시할 수 있다.","분석 결과를 바탕으로 예산 조정 및 재분배를 실시하여 예산 집행의 효율성을 높일 수 있다.","예산 집행 결과를 항목별로 분류하고 민감도 분석을 통해 차년도 예산 수립에 반영할 수 있다."],"knowledge":["사업부별 업무 내용 및 비용 구조 이해","계정과목 정의와 분류","예산 차이 분석 절차 및 방법","민감도 분석 방법","재무제표 구조 및 주요 지표 이해"],"skill":["사업부별 과거 데이터 분석 능력","예산수립 관련 항목 정리 및 취합 능력","계획 대비 실적 차이 분석 능력","재무제표 분석 능력","스프레드시트 프로그램 활용 능력","보유자원 현황 분석 능력"],"attitude":["객관적인 시각으로 예산 부서를 신뢰하고 협력하려는 자세","예산에서 예상치 못한 변수에 유연하게 대응하려는 탄력적 자세","예산의 효율적 집행을 위한 관리자적 자세","예산 실적 차이에 대한 정확한 원인을 찾으려는 노력","예산 차이 발생 시 대응방안이 경영 성과와 연결된다는 경영자적 자세"],"certs":["공인회계사(CPA)","재경관리사","CIMA(국제관리회계사)"],"level":"수석","level_raw":"수석","level_buckets":["수석"],"level_display":"수석"},{"name":"회계감사","definition":"회계투명성 제고를 위하여 내·외부 감사를 준비하고 대응하며, 감사 결과를 반영하여 재무정보 를 정확하게 공시하는 역량","behaviors":["외부감사인과의 원활한 소통을 위해 감사 일정·범위 등을 포함한 커뮤니케이션 계획을 수립할 수 있 다.","감사인이 요구하는 재무제표, 주석, 부속명세서 등 감사 자료를 사전에 준비하고 신속하게 대응할 수 있다.","외부감사 시 재무정보의 신뢰성을 검증하기 위해 재무정보를 정확하게 작성하고 최신 상태로 유지할 수 있다.","감사인의 지적사항을 적극적으로 수용하고 내부 프로세스 개선에 반영하여 재발을 예방할 수 있다.","감사 결과에 따른 시정 조치를 신속하게 이행하고 개선 사항을 지속적으로 모니터링할 수 있다.","재무정보의 정확성과 신뢰성 보장을 위해 내부통제 시스템을 구축하고 운영할 수 있다.","공시 전에 재무정보를 사전 검토하여 오류나 누락이 없는지 확인할 수 있다.","회계관련규정에 따라 공시·신고자료 처리 업무를 수행할 수 있다.","공시 질의사항에 신속하고 정확하게 대응할 수 있다."],"knowledge":["회계관련규정","외부감사 및 회계 관련 규정","재무제표 작성 방법에 대한 관련 지식","증권시장 공시 규정","금융감독원 공시 규정","금융감독원 전자공시시스템 운영 방법"],"skill":["회계감사에 따른 주석 작성 능력","재무제표 작성·검증 능력","재무정보 작성 및 보고 능력","공시 질의사항에 대한 응대력","내부통제 시스템 구축 및 운영 능력"],"attitude":["감사 준비 자료에 대한 정확한 판단력을 갖추려는 자세","감사 준비 전 과정에 책임감을 갖는 자세","감사 준비 시 부서 간 적극적으로 협업하려는 자세","재무제표 작성에 있어 정확성을 최우선으로 하는 자세","감사 준비를 독립적·주도적으로 수행하려는 자세","공시 시기에 신속하게 대응하려는 자세"],"certs":["재경관리사","내부감사사(CIA)"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"재무제표작성","definition":"회계기간의 거래를 정리,마감하고 재무상태와 경영성과를 반영한 재무제표를 작성하는 역량","behaviors":["회사가 소유한 모든 자산(현금·매출채권·재고자산·유형자산 등)과 부채(차입금·미지급금·매입채무 등), 자본(자본금·이익잉여금·자본조정 등)을 식별하고 평가할 수 있다.","계정과목별 명세서를 작성하고 계정과목을 분류하여 재무상태표를 작성할 수 있다.","재화·서비스 제공 시점에 수익을 인식하고 직접 발생한 비용(매출원가·판관비·인건비·감가상각비 등) 을 대응시켜 손익계산서를 작성할 수 있다.","자본금·이익잉여금·자본조정·기타포괄손익누계액의 변동을 구분하여 자본변동표를 작성할 수 있다.","영업·투자·재무활동으로 인한 현금 유입과 유출을 구분하여 현금흐름표를 작성할 수 있다.","기초현금과 기말현금을 계산하고 현금흐름의 순증가액을 검증할 수 있다.","주석 작성에 필요한 모든 정보를 체계적으로 수집·정리하고 각 항목에 대한 세부 정보를 분류할 수 있다.","재무제표 작성에 적용할 회계정책을 명확히 정의하고 주석에 상세히 기술할 수 있다.","수집한 정보를 바탕으로 재무제표 이용자가 이해하기 쉽도록 간결하고 명확하게 주석을 작성할 수 있다.","외부 감사인과 적극적으로 협력하여 재무제표 및 주석의 정확성과 완전성을 높일 수 있다."],"knowledge":["기업실무에 적용되는 회계관련규정","계정과목에 대한 지식","재무제표 상호연계성 이해","재무제표 작성 및 표시 방법","현금흐름표 작성 방법론"],"skill":["계정과목별 명세서 작성 능력","계정과목 분류 능력","자산·부채·자본에 대한 평가 능력","손익 산정 능력","수익·비용에 대한 평가 능력","재무제표 작성 및 표시 능력","재무제표 검토 및 오류 확인 능력"],"attitude":["수리적 정확도를 기하려는 자세","회계관련규정을 철저히 준수하려는 의지","원활한 의사소통으로 감사인 및 유관부서와 협력하려는 자세","재무정보의 완전성과 신뢰성을 높이려는 책임감"],"certs":["재경관리사","전산회계 1급","IFRS관리사"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"원가계산","definition":"기업운영에 필요한 원가정보를 제공하기 위하여 제작원가를 집계·분석하고, 원가 분석 결과를 경영 의사결정과 원가 및 수익성 개선에 활용하는 역량","behaviors":["제작원가 구성항목 (지류, 인쇄, 제본, 후가공, 교구 등)을 구분할 수 있다.","제품 생산에 간접적으로 소요되는 비용(감가상각비 등 제작간접원가)을 분류할 수 있다.","원가요소별로 비용을 집계하여 총비용을 계산하고 원가흐름에 따라 배부할 수 있다.","설정한 배부 기준에 따라 총비용을 제품 또는 서비스 단위별로 배부하여 제품별 원가를 계산할 수 있 다.","제품별 원가 구조를 분석하고 원가 변동 원인을 파악할 수 있다.","원가 계산 결과를 정기적으로 검토하고 필요한 경우 수정하여 정확성을 유지할 수 있다.","원가 분석 결과를 활용하여 원가 개선 방향 및 수익성 개선 방안을 제시할 수 있다."],"knowledge":["원가 개념 및 원가계산방법","제작원가 구성 항목","원가흐름에 대한 배부 방법","재고자산 평가 방법","업종별 원가계산 적용 기준"],"skill":["원가 및 비용에 대한 구분 능력","원가흐름에 대한 배부 능력","원가의 다양한 관점에 따른 분류 능력","원가계산방법에 따른 원가 산출 능력","업종 특성에 따른 원가계산 적용 능력","재고자산 평가","엑셀 등 계산 관련 프로그램 활용 능력"],"attitude":["원가 및 원가계산에 있어 정확성을 최우선으로 하는 자세","원가 배부 기준 설정과 적용에 있어 정확성을 유지하려는 자세","원가배부와 관련 부서와 적극적으로 협업하려는 자세","업종 특성에 따른 원가계산 적용에 대한 판단력을 갖추려는 자세"],"certs":["재경관리사","원가분석사","ERP 정보관리사(회계)"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"결산처리","definition":"월·분기·연 결산 일정에 따라 계정을 정리하고 필요한 결산분개를 수행하여 정확한 마감을 완료 하는 역량","behaviors":["각 부서에서 수집한 매출·비용 등의 데이터를 집계하고 마감 여부를 확인할 수 있다.","재고 수량과 금액을 파악하여 재고 자산을 평가하고 재무상태표와 포괄손익계산서를 작성할 수 있 다.","매출채권·매입채무 등의 현황을 파악하고 대손충당금 설정 및 부채 평가를 실시할 수 있다.","유형자산의 감가상각비를 계산하여 비용으로 반영하고 결산 관련 세무 신고 준비를 할 수 있다.","결산 분개가 정확하게 이루어졌는지 계정과목·금액·날짜 등을 검토하고 누락 항목을 확인할 수 있다.","동일 유형의 거래나 사건에 대해 관련된 방식으로 일관되게 분개가 이루어졌는지 확인할 수 있다.","결산 분개가 관련 법률 및 규정(회계기준·세법 등)을 준수하는지 확인할 수 있다.","마감 전까지 미결된 거래를 모두 처리하고 외상매입금·미지급금 등을 적절히 처리할 수 있다.","마감 후에는 재무상태표·포괄손익계산서·현금흐름표 등 재무 보고서를 작성하고 오류·누락을 확인할 수 있다.","결산 결과를 경영진에게 보고하고 내년도 사업 계획 수립에 반영될 수 있도록 지원할 수 있다."],"knowledge":["기업실무에 적용되는 회계관련규정","계정과목에 대한 지식","원가흐름 및 발생주의 회계 원칙","결산 관련 세무 신고 방법"],"skill":["계정과목별 명세서 작성 능력","계정과목 분류 능력","손익 산정 능력","자산·부채에 대한 평가 능력","결산 분개 능력","결산 정리사항 분류 및 검토 능력"],"attitude":["회계관련규정을 철저히 준수하려는 의지","장부를 정확하게 작성하려는 자세","결산 시기를 준수하고 기한 내에 완료하려는 노력","결산 오류를 방지하기 위해 세심하게 검토하려는 자세"],"certs":["재경관리사","전산회계 1급","IFRS관리사"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"원천징수","definition":"각종 소득(근로·사업·기타·퇴직 등) 지급 시 관련 세법에 따라 원천세를 징수·신고·납부하는 역량","behaviors":["근로소득 지급 시 근로소득세를 간이세액표에 따라 계산하여 원천징수하고 나머지 금액을 지급할 수 있다.(인사)","사업소득(용역 제공 대가) 지급 시","3%, 기타소득(강연료·원고료·인세 등) 지급 시 필요경비를 제 외한 금액의 22%를 원천징수할 수 있다.","퇴직소득·금융소득 등 소득 유형별로 적용 세율과 징수 방법을 구분하여 원천징수를 수행할 수 있다.","매월 발생한 원천징수 대상 소득을 집계하고 다음 달 10일까지 원천징수이행상황신고서를 세무서에 제출할 수 있다.","원천징수 세액을 기한 내에 납부하고 납부 결과를 확인하여 기록·관리할 수 있다.","연말정산을 위해 구성원별 공제 항목(부양가족·보험료·교육비·의료비 등)을 수집하고 검토할 수 있 다.(인사)","연말정산 간소화서비스를 활용하여 구성원별 소득공제·세액공제를 적용하고 최종 환급 또는 추가 납 부 세액을 산출할 수 있다.(인사)","연말정산 결과를 구성원에게 안내하고 이의신청을 접수·반영하여 최종 결과를 확정할 수 있다.(인사)","원천징수영수증을 발급하고 지급명세서를 기한 내에 세무서에 제출할 수 있다."],"knowledge":["소득세법 규정 (소득 유형별 원천징수 세율 및 방법)","소득 유형별 원천징수 대상 및 세율 (근로·사업·기타·퇴직·금융소득)","연말정산 절차 및 소득공제·세액공제 항목","원천징수이행상황신고서 작성 기준","지급명세서 제출 기준 및 방법","개정세법 내용 (원천징수 관련)"],"skill":["기술","세무정보시스템 활용 능력","소득세법 적용 및 세액 산출 능력","세무신고서식 작성 능력","연말정산 간소화 시스템 활용 능력","소득 유형별 원천징수 세액 계산 능력","지급명세서 및 원천징수영수증 작성 능력"],"attitude":["신고·납부·제출 기한을 철저히 준수하려는 자세","개정세법을 예의 주시하고 변화에 신속하게 대응하려는 자세","소득 유형별 세율과 공제 항목을 정확하게 적용하려는 자세","구성원의 세금 관련 문의에 친절하고 정확하게 대응하려는 자세","원천징수 관련 자료를 체계적으로 보관·관리하려는 자세"],"certs":["세무사","전산세무 2급","재경관리사"],"level":"선임","level_raw":"선임","level_buckets":["선임"],"level_display":"선임"},{"name":"지방세 신고","definition":"지방세관계법과 지방자치단체 조례에 따라 과세표준·세율·납부세액을 산정하고 지방세목별로 신고·납부하는 역량","behaviors":["전년도 소득 금액과 세액공제·감면 사항을 확인하고 법인지방소득세 신고에 필요한 서류를 준비할 수 있다.","법인세 과세표준을 기반으로 지방세법에서 정한 세율을 적용하여 법인지방소득세 산출세액을 계산 할 수 있다.","세액공제 및 감면을 적용하여 최종 법인지방소득세액을 확정하고 신고 기한(매년 3월~4월 말) 내에 신고·납부할 수 있다.","지방세 포털(위택스) 또는 세무서 방문을 통해 온·오프라인으로 지방소득세 신고를 수행할 수 있다.","신고 내용에 오류나 수정사항이 있는 경우 기한 내에 수정 신고를 수행할 수 있다.","법인이 취득한 부동산(토지·건물·차량 등)의 유형과 취득 원인(매매·상속·증여 등)을 파악할 수 있다.","취득가액과 시가 표준액을 비교하여 과세표준을 산정하고 취득 자산별 세율 체계를 이해하고 적용하 여 취득세액을 계산할 수 있다.","취득일로부터 60일 이내에 취득세를 신고·납부하고 관련 서류(계약서·영수증·부동산등기부등본 등) 를 준비할 수 있다.","신고· 납부 지연 시 가산세 구조(일반무신고/부정무신고)를 이해하고 기한 관리를 철저히 할 수 있다."],"knowledge":["지방세 관련 법령 (지방세관계법·지방자치단체 조례)","지방소득의 범위 및 구분","취득세 관련 법령","취득세의 과세범위와 비과세 구분","지방세 공제·감면 규정사항"],"skill":["프로그램을 활용한 인터넷 신고·납부 능력","법인세(또는 소득세)에 따른 과세표준 산출 능력","지방소득세 신고서 작성 능력","취득세 관련 서류 작성 능력","세무정보시스템(위택스 등) 활용 능력"],"attitude":["지방세법 및 조례의 개정사항을 신속하게 수용하고 적용하려는 자세","지방세의 공제·감면 규정사항을 적극적으로 파악하고 적용하려는 노력","신고·납부 기한을 철저히 준수하여 가산세 발생을 예방하려는 자세","지방세목별 특성을 정확히 이해하고 오류 없이 처리하려는 자세"],"certs":["세무사","전산세무 2급","재경관리사"],"level":"선임","level_raw":"선임","level_buckets":["선임"],"level_display":"선임"},{"name":"자금관리","definition":"회사 자금 운영 기준에 따라 현금·예금·법인카드 등을 관리하고, 자금 수지를 예측하여 효율적 인 자금 운용 계획을 수립하는 역량","behaviors":["매일 현금의 입출금 내역을 기록하고 현금시재일보를 작성하여 당일의 현금 흐름을 파악할 수 있다.","월 1회 현금시재를 점검하여 장부와 실제 현금 일치 여부를 확인하고 증빙서류를 보관할 수 있다.","여러 은행의 예금 상품을 비교하여 적합한 예금 계좌를 개설하고 계좌의 종류·금리·만기일 등을 관리 할 수 있다.","정기적으로 예금 잔액을 확인하여 회사의 재무상태를 파악하고 금리 변동에 따른 적절한 대처 방안 을 마련할 수 있다.","보이스피싱·해킹 등 금융 사기로부터 예금을 보호하기 위해 비밀번호·보안카드를 철저히 관리할 수 있다.","법인카드 발급 신청 후 카드의 유효기간·결제일·한도 등을 확인하고 사용자 등록을 관리할 수 있다.","법인카드 사용 내역을 주기적으로 확인하고 회계 규정에 따라 업무 목적으로만 사용되는지 점검할 수 있다.","어음·수표 발행 시 발행 목적·금액·만기일 등을 명확히 기재하고 발행 대장에 기록하여 추적 관리할 수 있다.","어음·수표의 결제일에 사전에 자금을 확보하고 부도 발생 시 신속하게 대처하여 손실을 최소화할 수 있다.","자금 수지를 예측하여 효율적인 자금 운용 계획을 수립하고 필요 시 투자 수단을 모색할 수 있다."],"knowledge":["대금의 지급방법 및 지급기준","입·출금 전표 및 현금출납부 작성 방법","수신·여신 관련 법률 및 예금계정","법인카드 관련 금융거래 매뉴얼 및 법인카드 관리대장 작성 방법","어음법·수표법·예금자보호법","어음·수표 거래 관련규정"],"skill":["입·출금 근거자료 확인 및 소액현금 관리 능력","기업 자금사용계획 활용 능력","법인카드 관리 능력","어음관리대장 작성 능력","어음·수표 보관과 관리 능력","자금 수지 예측 및 운용계획 수립 능력"],"attitude":["현금 관리 규정을 철저히 준수하고 정확하게 관리하려는 자세","예금 관리 규정을 준수하고 정확성을 유지하려는 자세","법인카드 관리 규정을 준수하고 부정 사용을 예방하려는 자세","어음·수표 관리 규정을 준수하고 정확성·신뢰성·판단력을 갖추려는 자세","자금 부족이 발생하지 않도록 선제적으로 대비하고 유휴 자금을 효율적으로 운용하려는 자세"],"certs":["재경관리사","AFP(재무설계사)","ERP 정보관리사(회계)"],"level":"선임","level_raw":"선임","level_buckets":["선임"],"level_display":"선임"},{"name":"부가가치세 신고","definition":"재화·용역의 공급에서 발생하는 부가가치에 대해 부가가치세법에 따라 과세표준을 산정하고 신 고·납부하는 역량","behaviors":["공급 시기가 속하는 달의 다음 달 10일까지 세금계산서를 발급·수취하고 공급자 등록번호·상호·공급 가액 등 필수 기재사항을 정확히 입력할 수 있다.","수정세금계산서 발급 사유와 발급 절차를 이해하고 지연발급·미발급 시 가산세 부과를 예방할 수 있 다.","매출처별·매입처별 세금계산서 합계표를 작성하고 신용카드 매출전표·현금영수증·직불카드 등 매출 발생 건을 집계할 수 있다.","건물·구축물·차량 등 감가상각자산 취득 시 취득가액과 내용연수를 기재하여 건물 등 감가상각자산 취득명세서를 작성할 수 있다.","수출 등 영세율 적용 대상 거래의 관련 증빙서류(수출계약서·외화입금증명서·내국신용장 등)를 검토 하고 제출할 수 있다.","대손세액·공제받지 못할 매입세액·의제매입세액 등 부속서류를 정확하게 작성할 수 있다.","국세청 홈택스에서 매출·매입·신용카드 등 모든 항목을 입력하고 세액공제 항목(신용카드 매출전표 발행공제·의제매입세액공제·전자신고 세액공제 등)을 적용할 수 있다.","부가가치세 신고 시 적용 가능한 모든 세액공제 항목을 체크하여 납부세액을 정확하게 계산할 수 있 다.","전자신고서를 작성하고 기한 내에 제출하며, 납부세액을 은행 등 금융기관에 납부할 수 있다.","신고서 각 항목과 부속명세서의 관계를 검토하고 오류를 점검하여 정확한 신고를 완료할 수 있다."],"knowledge":["세금계산서 발급방법 및 수정세금계산서 발급사유와 발급절차","매입처별·매출처별 세금계산서합계표 작성 방법","영세율의 개념","대손세액의 처리절차","공제받지 못할 매입세액","신용카드매출전표 항목","부동산임대 용역에 대한 지식 및 간주임대료 계산방법","과세기간 및 예정신고대상과 확정신고대상","세액공제 대상 및 공제되지 않는 세액"],"skill":["세금계산서 기재사항 입력 및 프로그램 발급 능력","매출처별·매입처별 합계표 작성 및 세무정보시스템 운용 능력","수출실적명세서·대손세액공제신고·공제받지 못할 매입세액명세서 등 부속서류 작성 능력","부동산임대공급가액명세서 및 건물 등 감가상각자산 취득명세서 작성 능력","예정신고·확정신고 및 납부 능력","세무정보시스템을 활용한 신고서 작성 능력","전자신고 방법 및 오류점검 능력"],"attitude":["세법에 대한 세심하고 주의 깊은 자세","세금계산서 발급 및 수취 시기를 정확히 이해하고 처리하려는 노력","거래현황을 적극적으로 이해하고 변경된 세법을 면밀하게 적용하려는 의지","신고기한을 정확히 지키고 오류 없이 신고를 완료하려는 자세"],"certs":["전산세무 2급","재경관리사"],"level":"선임","level_raw":"선임","level_buckets":["선임"],"level_display":"선임"},{"name":"전표관리","definition":"회계상 거래를 인식하고 증빙서류에 근거하여 전표를 작성·처리하며 관련 자료를 체계적으로 관리하는 역량","behaviors":["발생한 거래의 성격을 파악하고 적절한 회계처리 방법을 판단할 수 있다.","식별된 거래의 크기와 가치를 측정하여 수익과 비용을 구분하고 적절한 측정 방법을 선택할 수 있다.","측정된 거래를 회계 장부에 분개하고 입금·출금·대체전표를 정확하게 작성할 수 있다.","작성된 전표를 관련 부서나 상사에게 결재를 받고 회계 시스템에 기록·반영할 수 있다.","중요한 증빙을 발행하는 경우 발행한 증빙의 사본을 보관하고 발행 관련 보조 장부를 만들어 관리할 수 있다.","증빙서류를 체계적으로 정리하고 주기적으로 점검하여 누락되거나 손상된 서류가 없는지 확인할 수 있다.","전자 증빙서류를 보안에 유의하여 저장하고 접근 권한을 제한하여 유출되지 않도록 관리할 수 있다.","전표 및 증빙서류 관련 오류 발생 시 원인을 파악하고 수정 전표를 작성하여 정확성을 유지할 수 있 다."],"knowledge":["회계상 거래와 일상생활에서의 거래를 구분하는 지식","주요 거래별 회계처리 기준","입금·출금·대체전표에 대한 지식","증빙서류 종류","증빙서류 관리 관련규정"],"skill":["거래의 결합관계 구분 능력","다양한 거래유형에 대한 구분 능력","거래를 장부에 기입·분석하는 능력","거래유형별 전표작성 능력","증빙서류 처리 및 보관·관리 능력"],"attitude":["거래를 신속하고 정확하게 구분하고 판단하려는 자세","전표를 신속하고 정확하게 작성하려는 자세","증빙서류 관리 관련규정을 철저히 준수하려는 자세","증빙서류의 보안과 기밀 유지에 책임감을 갖는 자세"],"certs":["전산회계 1급","재경관리사","ERP 정보관리사(회계)"],"level":"담당","level_raw":"담당","level_buckets":["담당"],"level_display":"담당"},{"name":"세무기초자료관리","definition":"세무조정 및 법인세 신고를 지원하기 위하여 재무데이터를 수집·정리하고 관련 기초자료를 작 성·관리하는 역량","behaviors":["세무조정에 필요한 재무제표, 계정별 원장, 거래 내역 등 기초 자료를 부서별로 수집하고 정리할 수 있다.","수집된 자료의 누락·오류 여부를 확인하고 담당자에게 보완을 요청할 수 있다.","세무조정 항목별로 필요한 기초자료(감가상각명세서·대손충당금명세서·접대비명세서 등)를 분류하 고 정리할 수 있다.","세법 규정에 따라 익금산입·손금산입 항목과 관련된 기초 데이터를 취합하여 정리할 수 있다.","법인세 신고에 필요한 부속명세서 작성을 위한 기초자료를 담당자가 활용할 수 있도록 체계적으로 제공할 수 있다.","전년도 세무 신고 자료와 당해 연도 자료를 비교하여 주요 변동 사항을 파악하고 보고할 수 있다.","세무 관련 자료를 법정 보관 기간에 따라 체계적으로 파일링하고 관리할 수 있다.","세무대리인 또는 상급자의 요청에 따라 필요한 자료를 신속하게 검색하고 제공할 수 있다."],"knowledge":["세무조정의 기본 개념 및 절차","법인세 신고에 필요한 부속서류의 종류와 구성","계정과목 분류 및 재무제표 구조","세무 자료 보관 관련 법적 기준 및 보관 기간","기업실무에 적용되는 기본 회계관련규정"],"skill":["계정별 원장 및 거래 내역 데이터 수집·정리 능력","세무조정 항목별 기초자료 분류 및 취합 능력","엑셀 등 스프레드시트를 활용한 데이터 정리 능력","세무 관련 자료 파일링 및 문서 관리 능력","전년도 대비 변동 사항 비교·분석 능력"],"attitude":["세무 기초자료의 정확성을 최우선으로 유지하려는 자세","자료 누락이나 오류가 발생하지 않도록 꼼꼼하게 확인하려는 자세","세무 관련 자료의 기밀성을 인식하고 보안을 철저히 유지하려는 자세","상급자와 세무대리인의 요청에 신속하고 정확하게 대응하려는 자세"],"certs":["전산세무 2급","재경관리사","ERP 정보관리사(회계)"],"level":"담당","level_raw":"담당","level_buckets":["담당"],"level_display":"담당"},{"name":"감사지원 및 자료관리","definition":"내·외부 감사가 원활하게 진행될 수 있도록 감사 관련 자료를 수집·정리하고 감사 일정 관리를 지원하는 역량","behaviors":["내·외부 감사 일정을 파악하고 감사 준비에 필요한 자료 목록을 작성하여 사전에 준비 계획을 수립할 수 있다.","감사인이 요청하는 재무제표, 계정별 원장, 거래 내역, 계약서 등 증빙자료를 부서별로 수집하고 취 합할 수 있다.","수집된 자료의 누락·오류 여부를 확인하고 관련 부서에 보완을 요청하여 완전한 자료를 준비할 수 있 다.","감사 자료를 항목별·계정별로 체계적으로 분류하고 감사인이 쉽게 찾을 수 있도록 정리할 수 있다.","감사 진행 중 감사인의 추가 자료 요청에 신속하게 대응하고 필요한 자료를 제공할 수 있다.","감사 결과 지적사항과 시정 요청 내용을 정리하고 담당자에게 전달하여 후속 조치를 지원할 수 있다.","감사 완료 후 감사 관련 자료를 법정 보관 기간에 따라 체계적으로 파일링하고 관리할 수 있다.","내부통제 관련 기초자료를 정기적으로 업데이트하여 상시 감사 대응 체계를 유지할 수 있다."],"knowledge":["내·외부 감사 절차 및 감사 자료 요청 기준","재무제표 구조 및 계정과목에 대한 기본 지식","회계관련규정 및 감사 관련 규정","증빙서류 종류 및 보관 관련 법적 기준","내부통제 개념 및 기본 절차"],"skill":["감사 자료 수집·취합 및 체계적 분류 능력","감사 준비 체크리스트 작성 및 관리 능력","엑셀 등 스프레드시트를 활용한 자료 정리 능력","감사 관련 문서 파일링 및 관리 능력","감사인 요청사항에 대한 신속한 자료 검색 및 제공 능력"],"attitude":["감사 자료의 정확성과 완전성을 유지하려는 책임감 있는 자세","감사 일정을 엄수하고 기한 내에 자료를 준비하려는 자세","감사인 및 유관 부서와 원활하게 협력하려는 자세","감사 관련 자료의 기밀성을 인식하고 보안을 철저히 유지하려는 자세"],"certs":["재경관리사","전산회계 1급","ERP 정보관리사(회계) 17. 인사"],"level":"담당","level_raw":"담당","level_buckets":["담당"],"level_display":"담당"}]},{"org":"인재경영팀","job":"인사","slogan":"사람을 통해 회사의 성장과 성과를 만든다","role":"조직의 전략 방향에 맞는 인사제도와 보상체계를 설계·운영하여 구성원의 몰입과 성과 창출을 이끈다. 필요한 인재를 적시에 확보하고 체계적으로 육성하여 회사의 지속적인 경쟁력과 성장 동력을 창출한다.","competencies":[{"name":"인사기획","definition":"조직의 비전과 중장기 사업전략에 근거하여 인적자원의 효율적 운영을 위한 인사전략을 수립하 고, 인사제도를 기획·개선하여 조직의 목표 달성을 지원하는 역량","behaviors":["조직의 비전과 중·장기 사업전략에 따라 내/외부 인사전략 환경을 분석할 수 있다.","인사전략 환경분석 결과에 따라 중ㆍ장기 인사전략의 방향성을 수립할 수 있다.","중ㆍ장기 방향성에 따라 당해 연도의 인사전략을 수립할 수 있다.","수립된 인사전략과 제도의 실행 결과를 모니터링하고 개선 방향을 도출할 수 있다.","인사전략 추진을 위한 예산 계획을 수립하고 인건비 운영 방향을 제시할 수 있다.","인사전략에 따라 새로운 인사제도를 기획할 수 있다.","인사제도별 세부 내용(기준, 프로세스 등)을 설계할 수 있다."],"knowledge":["인사전략 환경분석법","조직의 인사제도와 운영방침 활용 기준","인사제도 관련 지식 및 트렌드","인사규정","인건비 구조 및 예산수립 방법","조직 진단 방법론","근로기준법"],"skill":["벤치마킹 사례분석 능력","인사전략 기획 및 문서화 능력","데이터 분석 및 환경 분석 능력","이해관계자 설득 및 커뮤니케이션 능력","시행 단계별 세부 실행계획 작성 기술"],"attitude":["인사전략이 조직 성과에 미치는 영향을 인식하고 주인의식을 갖는 자세","조직의 특성과 상황을 이해하려고 하는 자세","조직원들의 입장과 정서를 고려하는 자세","다양한 대안을 검토하여 조직에 최적화된 방안을 찾으려는 자세","HR트렌드와 타사 사례에 지속적으로 관심을 갖고 학습하려는 자세","계획의 적정성을 검증하려는 자세"],"certs":["HRM 전문가, 인적자원개발관리사(HRDM), 경영지도사 (인사·조직)"],"level":"수석(리더급)","level_raw":"수석(리더급)","level_buckets":["수석"],"level_display":"수석"},{"name":"인재개발전략수립","definition":"조직의 비전과 목표 달성을 위하여 인재개발의 필요성과 방향성을 분석하고, 이를 근거로 중장 기 인재개발 전략을 수립하는 역량","behaviors":["기업의 비전, 경영 환경, 인재상을 분석하여 인재개발 전략의 필요성과 방향성을 도출할 수 있다.","중장기 인재개발 전략에 영향을 미치는 내외부 이슈를 파악하고 시사점을 도출할 수 있다.","인재개발 전략의 방향성에 근거하여 인재개발 부문의 미션·비전·역할을 설정할 수 있다.","중장기 인재개발 목표·추진방침·추진과제를 체계적으로 설정할 수 있다.","목표·방침·과제를 종합하여 중장기 인재개발 전략을 수립할 수 있다.","중장기 목표와 방침에 근거하여 연도별 교육목표·방침·핵심과제를 도출할 수 있다.","연도별 교육목표와 과제 실현을 위한 추진계획을 수립할 수 있다.","수립된 인재개발 전략의 실행 결과를 점검하고 차년도 전략에 반영할 수 있다."],"knowledge":["인재상의 개념","인사정책","인사제도","인재개발 이슈 정보","미션·비전 설정방법 및 상호 관계","중장기 인재개발 목표,전략,추진과제 설정방법","년도별 인재개발 목표,전략,추진과제 설정방법","HRD 트렌드 및 학습 방법론"],"skill":["경영환경 정보 수집 및 분석 능력","전략 필요점 도출능력","인재개발 부문의 미션 및 비전 설정능력","연도별 교육 목표/방침/과제 설정 능력","이해관계자 설득 및 전략 발표 능력","년도별 인재개발 추진계획서 작성능력"],"attitude":["객관적 분석 노력","전략적 관점에서 인재개발 필요성을 판단하려는 자세","기업 전략과의 정렬 노력","인재개발 이슈에 대한 관심","인재개발이 조직 성과에 미치는 영향을 인식하고 적극적으로 역할을 수행하려는 자세","단기 성과보다 장기적 인재 성장을 우선하는 미래지향적 자세","단계적 접근을 고려한 기획 태도"],"certs":["인적자원개발관리사","HRD전문가","코칭 자격(KAC","KPC)"],"level":"수석(리더급)","level_raw":"수석(리더급)","level_buckets":["수석"],"level_display":"수석"},{"name":"임금관리","definition":"조직의 보상 경쟁력 확보를 위하여 시장 임금을 조사·분석하고, 임금체계를 설계하며 임금인상 률 확정 및 인건비를 종합적으로 관리하는 역량","behaviors":["임금조정안 수립을 위하여 거시적·미시적 경제 지표 및 동종업계 임금 현황을 조사할 수 있다.","임금조정안의 객관성 확보를 위하여 외부 전문기관을 통해 조직의 임금수준 경쟁력을 검토할 수 있 다.","조직의 경영 성과와 지불능력을 분석하여 당해 연도 임금 조정 방향을 설정할 수 있다.","조직의 지불능력, 생계비, 동종업계 임금수준을 고려하여 직급별 임금인상률을 추정할 수 있다.","인사고과 평가결과를 바탕으로 개인별 임금인상률을 산정하고 가용재원 내에서 조정할 수 있다.","회사·부서·개인 평가를 반영하여 당해 연도 성과급 지급률을 산정할 수 있다.","직급별 임금인상률을 바탕으로 당해 연도 직급별 임금표를 작성할 수 있다.","임금체계의 적정성을 주기적으로 검토하고 제도 개선 방향을 제안할 수 있다.","연간 인건비 총액을 관리하고 예산 대비 실적을 분석하여 차년도 인건비 계획에 반영할 수 있다."],"knowledge":["사업계획","시장조사방법","임금체계 설계 및 임금관리 방법론","재무제표분석","경제상황분석","근로기준법","평가제도","인건비 예산 수립 및 관리 방법","직무급·호봉급·성과급 등 임금체계 유형","최저임금법, 사회보험법, 소득세법"],"skill":["재무제표분석 능력","데이터분석 능력","인건비 시뮬레이션 작성능력","임금체계 설계 및 임금표 작성 능력","경영진 보고 및 협상 능력","HR 시스템(ERP, e-HR)을 활용한 임금 데이터 관리 능력"],"attitude":["시장 및 동종업계 임금수준을 면밀히 분석하여 전략적으로 임금조정안을 수립하려는 자세","현재 임금구조의 문제점을 인식하고 적극적으로 개선하려는 자세","회사와 구성원 모두에게 합리적인 임금 방안을 설계하려는 균형적 자세","임금정보 보안의 중요성을 인식하고 철저히 관리하려는 자세","임금계약 체결 시 구성원과 상생할 수 있는 결과를 도출하려는 자세"],"certs":["HRM전문가","NCS 활용 급여 전문가","SHRM-SCP"],"level":"수석(리더급)","level_raw":"수석(리더급)","level_buckets":["수석"],"level_display":"수석"},{"name":"인사제도운영","definition":"조직의 성과향상과 구성원의 능력 개발을 위하여 평가 및 승진 제도를 운영하고, 목표 설정·평 가 실시·승진자 선발 등 인사제도 전반을 관리·개선하는 역량","behaviors":["수립된 인사제도를 기반으로 당해 연도 목표 설정 및 평가계획을 수립할 수 있다.","조직구성원에게 주요 성과지표를 공유하고 개인별 목표 설정을 지원하여 최종 목표를 확정할 수 있 다.","평가방법에 따라 조직과 개인의 목표 수준을 평가하는 가이드라인을 설정할 수 있다.","평가자와 피평가자를 대상으로 평가제도, 평가오류 유형, 프로세스, 면담기법 등 평가교육을 실시할 수 있다.","평가계획에 따라 평가를 시행하고 공정성 확보를 위해 전반적인 평가과정을 검토할 수 있다.","평가결과를 공개하고 이의 제기 절차를 거쳐 최종등급을 확정하며, 피드백 절차를 관리할 수 있다.","승진 심사 기준을 직원들에게 안내하고 심사 자료를 취합·정리하여 승진 준비를 지원할 수 있다.","승진심사를 위한 인사위원회를 구성하고 기준에 따라 운영하여 최종 승진자를 선발할 수 있다.","승진자 선발 결과를 기준에 맞게 구성원에게 공유할 수 있다.","평가·승진 제도의 운영 결과를 분석하여 개선 방향을 도출하고 차년도 계획에 반영할 수 있다."],"knowledge":["회사 인사제도 (직급체계, 평가제도, 승진제도 등)","평가 기법 및 도구","평가자 오류 유형","역량 모델링","조직 R&R 및 주요 성과지표(KPI)","목표관리제도(MBO) 및 OKR 방법론","근로기준법 및 인사 관련 법규"],"skill":["평가지 설계 기술","평가 결과 분석 능력","인사제도 개선 및 운영계획 수립 능력","기획력 및 분석력","성과지표 설계 기술","승진 후보자 역량 평가 및 선발 기술","평가·승진 일정 계획 및 진행 관리 능력"],"attitude":["제도 운영에 있어 원칙을 준수하려는 자세","평가제도 및 승진 제도 개선에 대한 문제의식","성과지표 공유를 위한 개방적 의사소통","평가·승진 제도를 조직 전략과 연계하여 운영하려는 자세","가이드라인 설정 시 합리성을 유지하려는 자세","평가 오류를 최소화하는 방법을 적극적으로 교육하려는 자세","피평가자 대상으로 제도에 대해 명확하게 이해시키려는 의지","제도 시행 과정에서의 공정성 유지","평가 및 승진 결과의 수용성을 높이려는 노력"],"certs":["HRM 전문가, 경영지도사(인사조직), 직업상담사1급"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"HR데이터분석","definition":"인사 관련 데이터를 수집·분석하여 인력 현황, 채용 효율, 교육 효과, 이직률, 인건비 추이 등 주 요 HR 지표를 도출하고, 이를 바탕으로 데이터 기반의 인사 의사결정을 지원하는 역량","behaviors":["채용, 평가, 교육, 근태, 급여 등 인사 관련 데이터를 체계적으로 수집하고 관리할 수 있다.","주요 HR 지표(이직률, 채용 소요기간, 교육 이수율, 인건비 비율 등)를 정기적으로 산출하고 모니터 링할 수 있다.","HR 데이터 분석 결과를 시각화하여 경영진과 현업 리더에게 이해하기 쉬운 형태로 보고할 수 있다.","인력 현황 및 인건비 추이를 분석하여 인력운영 계획 수립에 활용할 수 있다.","채용 채널별 효율성을 분석하여 채용 전략 개선에 반영할 수 있다.","교육 참여율과 역량 변화 데이터를 연계 분석하여 교육 효과를 측정할 수 있다.","이직률·결근율 등 조직건강도 지표를 분석하여 선제적 인사 개입 방향을 도출할 수 있다.","분석 결과를 근거로 인사제도 개선 방향을 제안할 수 있다."],"knowledge":["HR 주요 지표(KPI) 개념 및 산출 방법","인사 데이터 구조 및 HR 시스템(ERP, e-HR) 이해","기초 통계 및 데이터 분석 방법론","데이터 시각화 방법","개인정보보호법 및 데이터 보안 기준"],"skill":["엑셀 및 데이터 분석 도구(피벗테이블, 함수 등) 활용 능력","HR 대시보드 설계 및 구축 능력","데이터 시각화 능력 (그래프, 차트 등)","HR 시스템 데이터 추출 및 가공 능력","보고서 작성 능력"],"attitude":["데이터를 객관적으로 해석하고 판단하려는 자세","수치 이면의 의미를 읽으려는 분석적 사고","인사 현안을 데이터로 증명하려는 적극적 자세","데이터 보안과 개인정보 보호를 철저히 준수하려는 자세","지속적인 지표 개선과 분석 역량 향상 의지"],"certs":["데이터분석준전문가(ADsP)","HRM전문가","SQLD(SQL개발자)"],"level":"책임","level_raw":"책임","level_buckets":["책임"],"level_display":"책임"},{"name":"노사갈등해결","definition":"노사 간 신뢰 관계를 구축하고 노동법규 준수 여부를 관리하며, 갈등 상황을 조기에 감지하여 대화와 협의를 통해 건설적으로 해결하고 구성원의 고충을 처리하는 역량","behaviors":["노사관계 관련 조직의 정책에 따라 이와 관련한 조직 구성원들의 요구를 파악할 수 있다.","파악된 요구사항을 바탕으로 노사관계 개선계획을 수립하고 실행하여 구성원의 신뢰를 증진할 수 있 다.","노사 간 신뢰 증진을 위한 제도 개선과 바람직한 노사문화 환경을 조성할 수 있다.","노동법에 준하여 근로계약, 취업규칙, 단체협약 등의 준수 여부를 검토할 수 있다.","부당노동행위 등 법률 위반이 발생하지 않도록 교육·홍보를 통해 예방하고, 위반 발생 시 규정에 따 라 신속히 조치할 수 있다.","위반행위의 예방과 처리를 위하여 유관기관과 협력관계를 유지할 수 있다.","근로자  온보딩·멘토링 지원 능력","업무 배분 조정 및 성과 보고 능력"],"attitude":["상담사의 성장을 진심으로 지원하려는 코칭 중심의 리더십","성과 데이터를 객관적으로 분석하고 공정하게 피드백하려는 합리적 자세","팀 전체의 역량 향상을 위해 지속적으로 노력하려는 책임감"],"certs":["코칭전문가 (KCA 한국코치협회)","CS Leaders(한국생산성본부)","HRD전문가 (한국산업인력공 단)"],"level":"중간관리직(선임~책임)","level_raw":"중간관리직(선임~책임)","level_buckets":["선임","책임"],"level_display":"중간관리직(선임~책임)"},{"name":"데이터 분석능력","definition":"상담 데이터를 정량적으로 분석하여 문제를 예측하고 대비하며 서비스 프로세스를 개선하는 역량","behaviors":["상담 데이터(인입량·처리시간·만족도·VOC 유형 등)를 수집하고 분석 목적에 맞게 정리할 수 있다.","상담 데이터를 분석하여 반복적으로 발생하는 문제 패턴과 개선 기회를 파악할 수 있다.","데이터 분석 결과를 바탕으로 향후 발생 가능한 문제를 예측하고 사전 대응 방안을 마련할 수 있다.","분석 결과를 표·그래프 등으로 시각화하여 팀원 및 상위자가 이해하기 쉽게 정리할 수 있다.","데이터 분석 결과를 활용하여 서비스 프로세스 개선 방향을 도출하고 제안할 수 있다.","상담사별·시간대별·유형별 데이터를 비교 분석하여 운영 효율화 방안을 도출할 수 있다.","데이터 분석 결과를 정기적으로 보고하고 프로세스 개선 실행을 지원할 수 있다."],"knowledge":["상담 데이터 수집 및 분석 방법","데이터 시각화 방법 및 도구(Excel·BI 툴 등)","문제 예측 및 사전 대응 방안 도출 방법","서비스 프로세스 개선 방법론","상담 운영 효율화 지표 및 분석 기준"],"skill":["상담 데이터 수집·정리·분석 능력","문제 패턴 파악 및 개선 기회 도출 능력","문제 예측 및 사전 대응 방안 마련 능력","데이터 시각화 및 보고서 작성 능력","프로세스 개선 방향 도출 및 제안 능력"],"attitude":["데이터를 객관적으로 분석하고 사실에 근거하여 판단하려는 합리적 자세","데이터에서 의미 있는 인사이트를 찾으려는 탐구적 자세","분석 결과를 실질적인 프로세스 개선으로 연결하려는 실행력"],"certs":["ADsP(데이터분석준전문가)","SQLD(SQL개발자)","CS Leaders(한국생산성본부)"],"level":"중간관리직(선임~책임)","level_raw":"중간관리직(선임~책임)","level_buckets":["선임","책임"],"level_display":"중간관리직(선임~책임)"},{"name":"강의능력","definition":"교육 과정의 목표에 맞게 강사로서 효과적으로 내용을 전달하고 교육 대상자들이 적극적으로 참여할 수 있도록 지원하는 역량","behaviors":["교육 목표와 대상자 수준을 파악하고 이에 맞는 강의 방식과 내용 전달 방법을 설계할 수 있다.","상담 실무 경험을 바탕으로 현장에서 바로 활용 가능한 사례 중심의 강의를 진행할 수 있다.","교육 대상자들의 참여를 유도하는 질문·토론·실습 등 다양한 교수법을 활용할 수 있다.","강의 중 교육 대상자들의 이해도를 확인하고 이해가 부족한 부분을 보완하여 전달할 수 있다.","강의 후 교육 대상자의 피드백을 수렴하고 강의 내용과 방식을 개선할 수 있다.","강의 자료를 교육 목표에 맞게 구성하고 가독성 높게 제작할 수 있다.","온·오프라인 교육 환경에서 모두 효과적으로 강의를 진행할 수 있다."],"knowledge":["강의 설계 방법 및 교수법 종류","현장 사례 중심 강의 구성 방법","교육 참여 유도 방법(질문·토론·실습 등)","강의 자료 제작 방법 및 시각화 원칙","온·오프라인 강의 운영 방법"],"skill":["교육 목표·대상자 수준 파악 및 강의 설계 능력","사례 중심 강의 진행 능력","교육 참여 유도 및 교수법 활용 능력","이해도 확인 및 보완 전달 능력","강의 자료 제작 및 피드백 반영 능력"],"attitude":["교육 대상자가 최대한 많은 것을 얻어갈 수 있도록 강의에 최선을 다하려는 자세","교육 대상자의 피드백을 수용하고 강의를 지속적으로 개선하려는 노력","현장 경험을 바탕으로 실질적으로 도움이 되는 강의를 제공하려는 자세"],"certs":["직업능력개발훈련교사","HRD전문가 (한국산업인력공단)","평생교육사 2급"],"level":"중간관리직(선임~책임)","level_raw":"중간관리직(선임~책임)","level_buckets":["선임","책임"],"level_display":"중간관리직(선임~책임)"},{"name":"교육과정 설계 및 운영","definition":"교육과정 개발 요구사항 분석에 의거하여 교육 목표·순서·방법 등을 설계하고 단위 교육과정의 운영계획 수립·준비·진행·결과보고 활동을 수행하는 역량","behaviors":["교육 요구사항을 분석하고 교육 목표·대상·내용·방법·일정을 포함한 교육과정을 설계할 수 있다.","상담사의 역량 수준과 업무 특성을 반영하여 실무 중심의 교육 커리큘럼을 구성할 수 있다.","단위 교육과정의 운영계획을 수립하고 강사·장소·자료 등 필요한 자원을 준비할 수 있다.","교육과정을 계획에 따라 진행하고 운영 중 발생하는 이슈에 신속하게 대응할 수 있다.","교육 후 참여자 평가 설문을 운영하고 결과를 분석하여 교육 효과성을 측정할 수 있다.","교육과정 운영 결과보고서를 작성하고 상위자에게 교육 성과를 명확하게 보고할 수 있다.","교육과정 운영 결과를 분석하고 차기 교육과정 설계에 반영할 개선 사항을 도출할 수 있다."],"knowledge":["교육과정 설계 방법론 (ADDIE·SAM 등)","교육 요구사항 분석 방법","상담사 역량 수준 분석 및 커리큘럼 구성 방법","교육 운영계획 수립 및 자원 준비 방법","교육 효과성 평가 방법 및 결과보고서 작성 방법"],"skill":["교육 요구사항 분석 및 교육과정 설계 능력","실무 중심 커리큘럼 구성 능력","교육 운영계획 수립 및 자원 준비 능력","교육과정 진행 및 이슈 대응 능력","교육 효과성 평가 및 결과보고서 작성 능력"],"attitude":["교육이 현장에서 실질적인 성과로 이어질 수 있도록 실무 중심으로 설계하려는 자세","교육 운영의 완성도를 높이기 위해 기획부터 결과보고까지 끝까지 책임지려는 자세","교육 참여자의 피드백을 적극적으로 수렴하고 지속적으로 개선하려는 노력"],"certs":["HRD전문가 (한국산업인력공단)","직업능력개발훈련교사","평생교육사 2급"],"level":"중간관리직(선임~책임)","level_raw":"중간관리직(선임~책임)","level_buckets":["선임","책임"],"level_display":"중간관리직(선임~책임)"},{"name":"교육 사후 관리","definition":"교육과정에서 습득한 지식·기술·태도를 현업에 적용하여 성과로 연결될 수 있도록 계획을 수립 하고 지원 활동을 수행하는 역량","behaviors":["교육 종료 후 상담사가 교육 내용을 현업에 적용할 수 있도록 현업 적용 계획을 수립할 수 있다.","교육 내용의 현업 적용 여부를 모니터링하고 적용 수준을 점검하여 피드백을 제공할 수 있다.","현업 적용 과정에서 어려움을 겪는 상담사를 파악하고 추가 코칭·지원을 제공할 수 있다.","교육 후 일정 기간이 지난 시점에 상담 성과 변화를 분석하여 교육 효과성을 측정할 수 있다.","교육 내용이 현업에서 일관성 있게 적용될 수 있도록 팔로업 교육·보완 자료를 제공할 수 있다.","교육 사후관리 결과를 정리하고 상위자에게 보고하며 교육 개선에 반영할 사항을 제안할 수 있다.","우수 적용 사례를 발굴하고 팀 내에 공유하여 교육 효과를 확산시킬 수 있다."],"knowledge":["현업 적용 계획 수립 방법","교육 현업 적용 모니터링 방법","교육 효과성 측정 방법 및 기준","팔로업 교육·보완 자료 제공 방법","우수
